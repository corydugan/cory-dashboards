  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #1a6b5a;
      --primary-dim: rgba(26,107,90,0.08);
      --primary-mid: #248f78;
      --accent: #e8a838;
      --accent-dim: rgba(232,168,56,0.10);

      --text: #e8e8ea;
      --text-secondary: #a0a0aa;
      --text-muted: #5a5a66;
      --green: #34d399;
      --green-dim: rgba(52,211,153,0.10);
      --red: #f87171;
      --red-dim: rgba(248,113,113,0.10);
      --purple: #a78bfa;
      --purple-dim: rgba(167,139,250,0.10);
      --blue: #60a5fa;
      --pink: #f472b6;
      --amber: #fbbf24;
      --radius: 12px;
      --radius-sm: 8px;
      --font-heading: 'Source Serif 4', serif;
      --font-body: 'DM Sans', sans-serif;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .container { max-width: 800px; margin: 0 auto; padding: 20px 16px; padding-top: env(safe-area-inset-top, 20px); }

    /* Header */
    .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .header h1 { font-family: var(--font-heading); font-size: 1.3rem; font-weight: 600; }
    .header .date { font-size: 0.68rem; color: var(--text-muted); margin-top: 2px; }
    .streak-badge { font-size: 0.64rem; font-weight: 700; color: var(--primary); background: var(--primary-dim); padding: 4px 10px; border-radius: 20px; white-space: nowrap; }
    .sync-badge { font-size: 0.52rem; font-weight: 600; padding: 3px 8px; border-radius: 12px; white-space: nowrap; }
    .sync-idle { color: var(--text-muted); }
    .sync-synced { color: var(--green); background: var(--green-dim); }
    .sync-pushing,.sync-pulling { color: var(--accent); background: var(--accent-dim); }
    .sync-error { color: var(--red); background: var(--red-dim); }

    /* Cards */
    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; transition: all 0.15s ease; }
    .card.collapsed { cursor: pointer; padding: 10px 16px; }
    .card.collapsed:hover { background: var(--bg-hover); }
    .card-title { font-family: var(--font-heading); font-size: 0.84rem; font-weight: 600; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }

    /* Stats */
    .stats-strip { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
    .stat-card { flex: 1 1 0; min-width: 70px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 10px; text-align: center; }
    .stat-label { font-size: 0.52rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
    .stat-value { font-size: 0.92rem; font-weight: 700; }
    .sparkline-container { display: flex; align-items: center; justify-content: center; gap: 4px; }

    /* Forms */
    input[type="number"], input[type="text"], textarea {
      background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: var(--radius-sm);
      color: var(--text); font-family: var(--font-body); font-size: 0.74rem; padding: 8px 10px; width: 100%; outline: none; transition: border-color 0.15s;
    }
    input:focus, textarea:focus { border-color: var(--primary); }
    input::placeholder, textarea::placeholder { color: var(--text-muted); }

    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    /* Checkboxes */
    .check-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; background: rgba(255,255,255,0.015); border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; transition: all 0.15s; user-select: none; }
    .check-item:hover { background: rgba(255,255,255,0.03); }
    .check-item.checked { background: var(--primary-dim); border-color: rgba(26,107,90,0.2); }
    .check-box { width: 16px; height: 16px; border: 2px solid var(--text-muted); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 0.55rem; font-weight: 700; flex-shrink: 0; transition: all 0.15s; }
    .check-item.checked .check-box { border-color: var(--primary); background: var(--primary); color: #fff; }
    .check-text { font-size: 0.68rem; color: var(--text-secondary); }
    .check-item.checked .check-text { color: var(--primary-mid); }

    /* Sliders */
    input[type="range"] { -webkit-appearance: none; width: 100%; height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; outline: none; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--primary); cursor: pointer; }

    /* Pills */
    .pill { display: inline-block; padding: 4px 10px; border-radius: 14px; font-size: 0.60rem; font-weight: 600; border: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.12s; }
    .pill:hover { border-color: var(--primary); color: var(--text-secondary); }
    .pill.active { background: var(--primary-dim); border-color: var(--primary); color: var(--primary); }

    .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 5px 12px; font-family: var(--font-body); font-size: 0.64rem; font-weight: 500; cursor: pointer; }
    .btn-ghost:hover { color: var(--text-secondary); border-color: var(--text-muted); }

    /* Calendar */
    .cal-event { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border-subtle); font-size: 0.68rem; }
    .cal-event:last-child { border-bottom: none; }
    .cal-time { font-size: 0.60rem; font-weight: 600; color: var(--primary); white-space: nowrap; min-width: 50px; }

    /* Summary strip */
    .summary-strip { display: flex; justify-content: space-between; align-items: center; }
    .summary-done { font-size: 0.68rem; font-weight: 600; }
    .summary-details { font-size: 0.56rem; color: var(--text-muted); display: flex; gap: 6px; flex-wrap: wrap; }

    /* Heatmap */
    .heatmap-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .heatmap-cell { aspect-ratio: 1; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 0.52rem; font-weight: 700; max-width: 40px; margin: 0 auto; width: 100%; }
    .heatmap-label { font-size: 0.46rem; color: var(--text-muted); text-align: center; margin-bottom: 2px; }

    /* Section labels */
    .section-label { font-size: 0.54rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; margin: 14px 0 6px; }

    /* Task items */
    .task-item { display: flex; align-items: flex-start; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border-subtle); }
    .task-item:last-child { border-bottom: none; }
    .task-check { width: 16px; height: 16px; border: 2px solid var(--text-muted); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 0.5rem; font-weight: 700; flex-shrink: 0; cursor: pointer; margin-top: 1px; transition: all 0.15s; }
    .task-check.done { border-color: var(--primary); background: var(--primary); color: #fff; }
    .task-content { flex: 1; min-width: 0; }
    .task-title { font-size: 0.70rem; font-weight: 600; color: var(--text-secondary); line-height: 1.3; }
    .task-title.done { text-decoration: line-through; color: var(--text-muted); }
    .task-meta { font-size: 0.54rem; color: var(--text-muted); margin-top: 2px; }
    .task-delete { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.56rem; opacity: 0.4; padding: 2px 4px; flex-shrink: 0; }
    .task-delete:hover { opacity: 1; color: var(--red); }

    /* Tab bar */
    .tab-bar { display: flex; gap: 4px; margin-bottom: 8px; }
    .tab-btn { flex: 1; padding: 6px 8px; border-radius: var(--radius-sm); font-size: 0.60rem; font-weight: 600; border: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; text-align: center; transition: all 0.12s; }
    .tab-btn.active { background: var(--primary-dim); border-color: var(--primary); color: var(--primary); }

    /* Add task input */
    .add-task-row { display: flex; gap: 6px; margin-top: 8px; }
    .add-task-row input { font-size: 0.66rem; padding: 6px 10px; }
    .add-task-btn { background: var(--primary); color: #fff; border: none; border-radius: var(--radius-sm); padding: 6px 12px; font-size: 0.66rem; font-weight: 700; cursor: pointer; white-space: nowrap; }

    /* Waiting badge */
    .waiting-badge { font-size: 0.50rem; padding: 2px 6px; border-radius: 10px; background: var(--accent-dim); color: var(--accent); font-weight: 600; white-space: nowrap; }

    .fade-in { animation: fadeIn 0.2s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 600px) {
      .grid-3 { grid-template-columns: 1fr 1fr; }
      .container { padding: 16px 12px; }
    }
  </style>

<script>
'use strict';
var h=React.createElement,useState=React.useState,useEffect=React.useEffect,useMemo=React.useMemo,useRef=React.useRef,useCallback=React.useCallback;

var STORAGE_KEY='cory_daily_routine_v2';
var DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function today(){return new Date().toISOString().slice(0,10)}
function now(){return new Date().toISOString()}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function currentHour(){return new Date().getHours()}
function isMorning(){var hr=currentHour();return hr>=4&&hr<14}
function isEvening(){var hr=currentHour();return hr>=14||hr<4}
function formatDate(d){return new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}
function formatTime(iso){
  if(!iso)return'';var d=new Date(iso);var h=d.getHours();var m=d.getMinutes();
  var ampm=h>=12?'PM':'AM';h=h%12||12;return h+':'+(m<10?'0':'')+m+' '+ampm;
}

/* ── STORAGE ── */
var _mem={};
var EMPTY_STORE={days:{},tasks:[],taskIdCounter:100,_lastModified:0};
function loadLocal(){try{var r=null;try{r=window.localStorage.getItem(STORAGE_KEY)}catch(e){}if(!r)r=_mem[STORAGE_KEY]||null;return r?JSON.parse(r):JSON.parse(JSON.stringify(EMPTY_STORE))}catch(e){return JSON.parse(JSON.stringify(EMPTY_STORE))}}
function saveLocal(d){d._lastModified=Date.now();var s=JSON.stringify(d);try{window.localStorage.setItem(STORAGE_KEY,s)}catch(e){}_mem[STORAGE_KEY]=s}
function load(){return loadLocal()}
function save(d){saveLocal(d);driveQueueSync(d)}

/* ── GOOGLE DRIVE SYNC ── */
var DRIVE_FOLDER='Cory Dashboards';
var DRIVE_FILE='daily_routine_sync.json';
var _driveSync={folderId:null,fileId:null,status:'idle',lastSync:null,timer:null};
var _driveSyncListeners=[];
function onDriveSyncChange(fn){_driveSyncListeners.push(fn)}
function _notifyDrive(){_driveSyncListeners.forEach(function(fn){fn({status:_driveSync.status,lastSync:_driveSync.lastSync})})}
function _setDriveStatus(s){_driveSync.status=s;_notifyDrive()}

function driveQueueSync(data){
  if(!GCAL_CLIENT_ID||!window.gapi||!gapi.client||!gapi.client.drive)return;
  clearTimeout(_driveSync.timer);
  _driveSync.timer=setTimeout(function(){driveWriteData(data)},2000);
}

function driveEnsureFolder(){
  if(_driveSync.folderId)return Promise.resolve(_driveSync.folderId);
  return gapi.client.drive.files.list({q:"name='"+DRIVE_FOLDER+"' and mimeType='application/vnd.google-apps.folder' and trashed=false",spaces:'drive',fields:'files(id)'}).then(function(r){
    if(r.result.files&&r.result.files.length>0){_driveSync.folderId=r.result.files[0].id;return _driveSync.folderId}
    return gapi.client.drive.files.create({resource:{name:DRIVE_FOLDER,mimeType:'application/vnd.google-apps.folder'},fields:'id'}).then(function(c){_driveSync.folderId=c.result.id;return _driveSync.folderId});
  });
}

function driveEnsureFile(folderId){
  if(_driveSync.fileId)return Promise.resolve(_driveSync.fileId);
  return gapi.client.drive.files.list({q:"name='"+DRIVE_FILE+"' and '"+folderId+"' in parents and trashed=false",spaces:'drive',fields:'files(id,modifiedTime)'}).then(function(r){
    if(r.result.files&&r.result.files.length>0){_driveSync.fileId=r.result.files[0].id;return _driveSync.fileId}
    return null;
  });
}

function driveReadData(){
  _setDriveStatus('pulling');
  return driveEnsureFolder().then(function(fid){
    return driveEnsureFile(fid).then(function(fileId){
      if(!fileId){_setDriveStatus('idle');return null}
      return gapi.client.drive.files.get({fileId:fileId,alt:'media'}).then(function(r){
        _setDriveStatus('idle');_driveSync.lastSync=Date.now();_notifyDrive();return r.result;
      });
    });
  }).catch(function(e){_setDriveStatus('error');console.warn('Drive read error',e);return null});
}

function driveWriteData(data){
  _setDriveStatus('pushing');
  driveEnsureFolder().then(function(fid){
    var body=JSON.stringify(data);
    var boundary='--cory-sync--';
    var meta=_driveSync.fileId?{}:{name:DRIVE_FILE,parents:[fid],mimeType:'application/json'};
    var multipart='--'+boundary+'\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n'+JSON.stringify(meta)+'\r\n--'+boundary+'\r\nContent-Type: application/json\r\n\r\n'+body+'\r\n--'+boundary+'--';
    var path=_driveSync.fileId?'/upload/drive/v3/files/'+_driveSync.fileId:'/upload/drive/v3/files';
    var method=_driveSync.fileId?'PATCH':'POST';
    return gapi.client.request({path:path+'?uploadType=multipart',method:method,headers:{'Content-Type':'multipart/related; boundary='+boundary},body:multipart});
  }).then(function(r){
    if(r&&r.result&&r.result.id)_driveSync.fileId=r.result.id;
    _driveSync.lastSync=Date.now();_setDriveStatus('synced');
    setTimeout(function(){_setDriveStatus('idle');_notifyDrive()},2000);
  }).catch(function(e){_setDriveStatus('error');console.warn('Drive write error',e)});
}

function drivePullAndMerge(callback){
  driveReadData().then(function(remote){
    if(!remote){callback(null);return}
    var local=loadLocal();
    if(remote._lastModified&&remote._lastModified>local._lastModified){
      /* Remote is newer: use remote but keep any local-only day data */
      var merged=JSON.parse(JSON.stringify(remote));
      if(local.days){Object.keys(local.days).forEach(function(k){if(!merged.days[k])merged.days[k]=local.days[k]})}
      saveLocal(merged);callback(merged);
    } else {
      /* Local is newer or equal: push local to Drive */
      driveQueueSync(local);callback(null);
    }
  });
}

/* ── SPARKLINE ── */
function Sparkline(props){
  var data=props.data||[];if(data.length<2)return null;
  var w=props.width||80;var ht=props.height||22;
  var mn=Math.min.apply(null,data);var mx=Math.max.apply(null,data);var range=mx-mn||1;
  var pts=data.map(function(v,i){return(i/(data.length-1))*w+','+(ht-2-((v-mn)/range)*(ht-4))}).join(' ');
  return h('svg',{width:w,height:ht,style:{display:'block'}},
    h('polyline',{points:pts,fill:'none',stroke:props.color||'var(--primary)',strokeWidth:1.5,strokeLinecap:'round'}));
}

/* ── SLIDER ── */
function Slider(props){
  return h('div',{style:{marginBottom:6}},
    h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:3}},
      h('span',{style:{fontSize:'0.62rem',color:'var(--text-secondary)'}},props.label),
      h('span',{style:{fontSize:'0.66rem',fontWeight:700,color:props.color||'var(--primary)'}},props.value)),
    h('input',{type:'range',min:0,max:props.max||10,step:1,value:props.value,
      onChange:function(e){props.onChange(parseInt(e.target.value))}}));
}

/* ═══════════════════════════════════════
   MAIN APP
   ═══════════════════════════════════════ */
function App(){
  var _store=useState(function(){
    var d=load();
    if(!d.tasks||d.tasks.length===0){d.tasks=DEFAULT_TASKS;d.taskIdCounter=100;save(d)}
    return d;
  });
  var store=_store[0];var setStore=_store[1];
  var todayKey=today();
  var todayData=(store.days&&store.days[todayKey])||{};

  /* Calendar state */
  var _calEvents=useState([]);var calEvents=_calEvents[0];var setCalEvents=_calEvents[1];
  var _calLoading=useState(false);var calLoading=_calLoading[0];
  var tokenClient=useRef(null);

  /* Sync status for UI */
  var _syncSt=useState('idle');var syncStatus=_syncSt[0];var setSyncStatus=_syncSt[1];

  useEffect(function(){
    onDriveSyncChange(function(s){setSyncStatus(s.status)});
    if(!GCAL_CLIENT_ID)return;
    var gs=document.createElement('script');gs.src='https://apis.google.com/js/api.js';
    gs.onload=function(){gapi.load('client',function(){gapi.client.init({discoveryDocs:[GCAL_DISCOVERY,DRIVE_DISCOVERY]}).then(function(){
      /* Try to pull from Drive on load */
      if(gapi.client.getToken()){drivePullAndMerge(function(merged){if(merged){setStore(merged)}})}
    })})};
    document.head.appendChild(gs);
    var gis=document.createElement('script');gis.src='https://accounts.google.com/gsi/client';
    gis.onload=function(){
      tokenClient.current=google.accounts.oauth2.initTokenClient({client_id:GCAL_CLIENT_ID,scope:GCAL_SCOPES,
        callback:function(r){if(!r.error){fetchCal();drivePullAndMerge(function(merged){if(merged){setStore(merged)}})}}});
    };document.head.appendChild(gis);
  },[]);

  function fetchCal(){
    var s=new Date();s.setHours(0,0,0,0);var e=new Date();e.setHours(23,59,59,999);
    gapi.client.calendar.events.list({calendarId:'primary',timeMin:s.toISOString(),timeMax:e.toISOString(),singleEvents:true,orderBy:'startTime',maxResults:20})
    .then(function(r){setCalEvents(r.result.items||[])});
  }
  function connectCal(){if(tokenClient.current)tokenClient.current.requestAccessToken({prompt:'consent'})}

  /* Demo events if not connected */

    {id:'d1',summary:'Morning Focus Block',start:{dateTime:todayKey+'T08:00:00'}},
    {id:'d2',summary:'Lab Meeting',start:{dateTime:todayKey+'T10:00:00'}},
    {id:'d3',summary:'MHANES Writing',start:{dateTime:todayKey+'T13:00:00'}},
    {id:'d4',summary:'HolisticHer Planning',start:{dateTime:todayKey+'T16:00:00'}}
  ]:[]);

  /* ── Updaters ── */
  function updateDay(key,val){
    var s=JSON.parse(JSON.stringify(store));
    if(!s.days)s.days={};if(!s.days[todayKey])s.days[todayKey]={};
    s.days[todayKey][key]=val;save(s);setStore(s);
  }

  function updateTasks(newTasks){
    var s=JSON.parse(JSON.stringify(store));s.tasks=newTasks;save(s);setStore(s);
  }

  function addTask(text,category){
    var s=JSON.parse(JSON.stringify(store));
    var id='t'+(s.taskIdCounter||100);s.taskIdCounter=(s.taskIdCounter||100)+1;
    s.tasks.push({id:id,text:text,meta:'Added '+todayKey,category:category||'active',done:false,priority:2});
    save(s);setStore(s);
  }

  function toggleTask(id){
    var newTasks=store.tasks.map(function(t){return t.id===id?Object.assign({},t,{done:!t.done,doneDate:t.done?null:todayKey}):t});
    updateTasks(newTasks);
  }

  function removeTask(id){
    updateTasks(store.tasks.filter(function(t){return t.id!==id}));
  }

  function saveMorning(){updateDay('morning_done',true);updateDay('morning_time',now())}
  function saveEvening(){updateDay('evening_done',true);updateDay('evening_time',now())}

  /* ── Derived stats ── */
  var streak=useMemo(function(){
    var s=0;var d=new Date();
    for(var i=0;i<365;i++){
      var k=d.toISOString().slice(0,10);var day=store.days&&store.days[k];
      if(day&&(day.morning_done||day.evening_done))s++;
      else if(i>0)break;
      d.setDate(d.getDate()-1);
    }return s;
  },[store]);

  var moodHistory=useMemo(function(){
    var arr=[];var d=new Date();
    for(var i=13;i>=0;i--){var dt=new Date(d);dt.setDate(dt.getDate()-i);var k=dt.toISOString().slice(0,10);
      var day=store.days&&store.days[k];if(day&&day.mood!=null)arr.push(day.mood)}return arr;
  },[store]);

  var energyHistory=useMemo(function(){
    var arr=[];var d=new Date();
    for(var i=13;i>=0;i--){var dt=new Date(d);dt.setDate(dt.getDate()-i);var k=dt.toISOString().slice(0,10);
      var day=store.days&&store.days[k];if(day&&day.energy!=null)arr.push(day.energy)}return arr;
  },[store]);

  var heatmap=useMemo(function(){
    var arr=[];var d=new Date();d.setDate(d.getDate()-d.getDay());
    for(var i=0;i<7;i++){var dt=new Date(d);dt.setDate(dt.getDate()+i);var k=dt.toISOString().slice(0,10);
      var day=store.days&&store.days[k]||{};var sc=0;if(day.morning_done)sc++;if(day.evening_done)sc++;
      arr.push({date:k,day:DAYS[dt.getDay()],score:sc,isToday:k===todayKey})}return arr;
  },[store]);

  /* Task counts */
  var activeTasks=store.tasks.filter(function(t){return t.category==='active'&&!t.done});
  var waitingTasks=store.tasks.filter(function(t){return t.category==='waiting'&&!t.done});
  var somedayTasks=store.tasks.filter(function(t){return t.category==='someday'&&!t.done});
  var doneTodayCount=store.tasks.filter(function(t){return t.done&&t.doneDate===todayKey}).length;

  /* Task tab state */
  var _taskTab=useState('active');var taskTab=_taskTab[0];var setTaskTab=_taskTab[1];
  var _newTaskText=useState('');var newTaskText=_newTaskText[0];var setNewTaskText=_newTaskText[1];

  function handleAddTask(){
    if(!newTaskText.trim())return;
    addTask(newTaskText.trim(),taskTab==='someday'?'someday':taskTab==='waiting'?'waiting':'active');
    setNewTaskText('');
  }

  var visibleTasks=taskTab==='active'?activeTasks:taskTab==='waiting'?waitingTasks:

          var color=d.score===2?'#fff':d.score===1?'var(--primary)':'var(--text-muted)';
          return h('div',{key:d.date,style:{textAlign:'center'}},
            h('div',{className:'heatmap-label'},d.day),
            h('div',{className:'heatmap-cell',style:{background:bg,color:color,border:d.isToday?'2px solid var(--accent)':'1px solid var(--border)'}},

    /* ── Morning ── */

      h('div',{className:'card',style:{borderLeft:'3px solid var(--primary)'}},
        h('div',{className:'card-title'},'\u2600\uFE0F Morning Check-In'),
        h('div',{className:'grid-3',style:{marginBottom:8}},

            h('label',{style:{fontSize:'0.54rem',color:'var(--text-muted)',display:'block',marginBottom:2}},'Weight (kg)'),
            h('input',{type:'number',step:'0.1',placeholder:'--',value:todayData.weight||'',style:{textAlign:'center'},
              onChange:function(e){updateDay('weight',e.target.value)}})),
          h('div',null,
            h('label',{style:{fontSize:'0.54rem',color:'var(--text-muted)',display:'block',marginBottom:2}},'Sleep (hrs)'),

          h('div',null,

            h('div',{style:{display:'flex',gap:3}},
              ['Bad','OK','Good'].map(function(q){
                return h('button',{key:q,className:'pill'+(todayData.sleep_quality===q?' active':''),style:{flex:1,padding:'5px 0'},
                  onClick:function(){updateDay('sleep_quality',q)}},q)})))
        ),
        h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr auto auto',gap:6,marginBottom:8,alignItems:'end'}},
          h('div',null,
            h('label',{style:{fontSize:'0.54rem',color:'var(--text-muted)',display:'block',marginBottom:2}},'BP Sys'),
            h('input',{type:'number',placeholder:'120',value:todayData.bp_sys||'',style:{textAlign:'center'},
              onChange:function(e){updateDay('bp_sys',e.target.value)}})),
          h('div',null,
            h('label',{style:{fontSize:'0.54rem',color:'var(--text-muted)',display:'block',marginBottom:2}},'BP Dia'),
            h('input',{type:'number',placeholder:'80',value:todayData.bp_dia||'',style:{textAlign:'center'},
              onChange:function(e){updateDay('bp_dia',e.target.value)}})),
          h('div',{className:'check-item'+(todayData.protein_shake?' checked':''),onClick:function(){updateDay('protein_shake',!todayData.protein_shake)}},
            h('div',{className:'check-box'},todayData.protein_shake?'\u2713':''),h('div',{className:'check-text'},'Shake')),
          h('div',{className:'check-item'+(todayData.medication?' checked':''),onClick:function(){updateDay('medication',!todayData.medication)}},
            h('div',{className:'check-box'},todayData.medication?'\u2713':''),h('div',{className:'check-text'},'Meds'))
        ),
        h('div',{style:{marginBottom:10}},
          h('label',{style:{fontSize:'0.54rem',color:'var(--text-muted)',display:'block',marginBottom:2}},'Today\'s intention'),

            onKeyDown:function(e){if(e.key==='Enter')saveMorning()}})),
        h('button',{className:'btn-primary',onClick:saveMorning},'Save Morning \u2713')

    /* ── Calendar ── */
    h('div',{className:'section-label',style:{marginTop:12}},'Schedule'),

      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}},
        h('div',{className:'card-title',style:{marginBottom:0}},'\uD83D\uDCC5 Calendar'),
        !GCAL_CLIENT_ID?
          h('span',{style:{fontSize:'0.50rem',color:'var(--text-muted)',fontStyle:'italic'}},'Demo (add Client ID to connect)'):
          h('button',{className:'btn-ghost',onClick:connectCal},'Connect')),
      displayEvents.length===0?
        h('div',{style:{fontSize:'0.68rem',color:'var(--text-muted)',padding:'6px 0'}},'No events'):
        displayEvents.map(function(ev){
          return h('div',{key:ev.id,className:'cal-event'},
            h('div',{className:'cal-dot'}),
            h('span',{className:'cal-time'},ev.start&&ev.start.dateTime?formatTime(ev.start.dateTime):'All day'),
            h('span',{className:'cal-title'},ev.summary||'(No title)'))})
    ),

    /* ── Intention reminder ── */
    todayData.intentions&&todayData.morning_done&&h('div',{className:'card',style:{borderLeft:'3px solid var(--accent)',marginTop:10,padding:'10px 14px'}},
      h('div',{style:{fontSize:'0.52rem',fontWeight:700,color:'var(--accent)',textTransform:'uppercase',letterSpacing:'1px',marginBottom:3}},'Today\'s Intention'),
      h('div',{style:{fontSize:'0.74rem',color:'var(--text)',lineHeight:1.4}},todayData.intentions)),

    /* ── TASKS ── */
    h('div',{className:'section-label',style:{marginTop:14}},'Tasks'),
    h('div',{className:'card'},
      /* Tab bar */
      h('div',{className:'tab-bar'},
        h('button',{className:'tab-btn'+(taskTab==='active'?' active':''),onClick:function(){setTaskTab('active')}},'Active (',activeTasks.length,')'),
        h('button',{className:'tab-btn'+(taskTab==='waiting'?' active':''),onClick:function(){setTaskTab('waiting')}},'Waiting (',waitingTasks.length,')'),
        h('button',{className:'tab-btn'+(taskTab==='someday'?' active':''),onClick:function(){setTaskTab('someday')}},'Someday'),
        h('button',{className:'tab-btn'+(taskTab==='done'?' active':''),onClick:function(){setTaskTab('done')}},'Done')

          return h('div',{key:t.id,className:'task-item'},

            h('div',{className:'task-content'},

            h('button',{className:'task-delete',onClick:function(e){e.stopPropagation();removeTask(t.id)}},'\u2715'))

    /* ── Evening ── */

          h(Slider,{label:'Energy',value:todayData.energy||5,onChange:function(v){updateDay('energy',v)},color:'var(--green)',max:10})),
        h('div',{style:{display:'flex',gap:6,marginBottom:8}},
          h('div',{className:'check-item'+(todayData.exercised?' checked':''),style:{flex:1},
            onClick:function(){updateDay('exercised',!todayData.exercised)}},

          h('label',{style:{fontSize:'0.54rem',color:'var(--text-muted)',display:'block',marginBottom:2}},'Win / gratitude'),
