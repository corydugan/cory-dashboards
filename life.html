<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f1117">
  <title>Life Interface — Dr. Cory Dugan</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --primary:#1a6b5a;--primary-dim:rgba(26,107,90,0.08);--primary-mid:#248f78;
      --accent:#e8a838;--accent-dim:rgba(232,168,56,0.10);
      --bg:#0f1117;--bg-card:#161921;--bg-hover:#1c1f2a;
      --border:rgba(255,255,255,0.06);--border-subtle:rgba(255,255,255,0.03);
      --text:#e8e8ea;--text-secondary:#a0a0aa;--text-muted:#5a5a66;
      --green:#34d399;--green-dim:rgba(52,211,153,0.10);
      --red:#f87171;--red-dim:rgba(248,113,113,0.10);
      --purple:#a78bfa;--purple-dim:rgba(167,139,250,0.10);
      --blue:#60a5fa;--blue-dim:rgba(96,165,250,0.10);
      --pink:#f472b6;--pink-dim:rgba(244,114,182,0.10);
      --amber:#fbbf24;--amber-dim:rgba(251,191,36,0.10);
      --rose:#fb7185;--rose-dim:rgba(251,113,133,0.10);
      --cyan:#22d3ee;--cyan-dim:rgba(34,211,238,0.10);
      --orange:#fb923c;--orange-dim:rgba(251,146,60,0.10);
      --radius:12px;--radius-sm:8px;
      --font-heading:'Source Serif 4',serif;--font-body:'DM Sans',sans-serif;
    }
    body{font-family:var(--font-body);background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased}

    /* Layout */
    .app{display:flex;min-height:100vh}
    .sidebar{width:200px;background:#0c0e14;border-right:1px solid var(--border);padding:16px 10px;position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:10}
    .sidebar-brand{padding:8px 6px 16px;border-bottom:1px solid var(--border);margin-bottom:12px}
    .sidebar-brand span{font-size:0.48rem;font-weight:700;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase}
    .sidebar-brand h2{font-family:var(--font-heading);font-size:1rem;font-weight:600;color:var(--text);margin-top:2px}
    .sidebar-section{font-size:0.46rem;font-weight:700;letter-spacing:1.5px;color:var(--text-muted);text-transform:uppercase;padding:12px 6px 4px}
    .sidebar-nav button{display:flex;align-items:center;gap:8px;width:100%;padding:7px 10px;border:none;background:transparent;color:var(--text-muted);font-family:var(--font-body);font-size:0.68rem;font-weight:500;border-radius:var(--radius-sm);cursor:pointer;transition:all 0.12s;text-align:left}
    .sidebar-nav button:hover{background:rgba(255,255,255,0.03);color:var(--text-secondary)}
    .sidebar-nav button.active{background:var(--primary-dim);color:var(--primary);font-weight:600}
    .sidebar-crisis{display:flex;align-items:center;gap:6px;width:100%;padding:8px 10px;border:1px solid var(--red-dim);background:var(--red-dim);color:var(--red);font-family:var(--font-body);font-size:0.66rem;font-weight:600;border-radius:var(--radius-sm);cursor:pointer;margin-top:auto}
    .main{margin-left:200px;flex:1;padding:20px 24px;max-width:740px}

    /* Mobile */
    .mobile-header{display:none}
    .mobile-tabs{display:none}
    @media(max-width:768px){
      .sidebar{display:none}
      .main{margin-left:0;padding:12px 14px;padding-top:env(safe-area-inset-top,12px)}
      .mobile-header{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:10}
      .mobile-tabs{display:flex;gap:2px;padding:6px 10px;overflow-x:auto;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:44px;z-index:9;-webkit-overflow-scrolling:touch}
      .mobile-tabs button{flex-shrink:0;padding:5px 10px;border:none;background:transparent;color:var(--text-muted);font-family:var(--font-body);font-size:0.58rem;font-weight:500;border-radius:var(--radius-sm);cursor:pointer;white-space:nowrap}
      .mobile-tabs button.active{background:var(--primary-dim);color:var(--primary);font-weight:600}
    }

    /* Cards */
    .card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px}
    .card-title{font-family:var(--font-heading);font-size:0.84rem;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:8px}
    .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}

    /* Buttons */
    .btn-primary{background:var(--primary);color:#fff;border:none;border-radius:var(--radius-sm);padding:9px 18px;font-family:var(--font-body);font-size:0.72rem;font-weight:600;cursor:pointer;transition:all 0.15s}
    .btn-primary:hover{background:var(--primary-mid)}
    .btn-ghost{background:transparent;color:var(--text-muted);border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 12px;font-family:var(--font-body);font-size:0.62rem;font-weight:500;cursor:pointer}
    .btn-ghost:hover{color:var(--text-secondary);border-color:var(--text-muted)}

    /* Pills */
    .pill{display:inline-block;padding:4px 10px;border-radius:14px;font-size:0.58rem;font-weight:600;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;transition:all 0.12s}
    .pill:hover{border-color:var(--primary);color:var(--text-secondary)}
    .pill.active{background:var(--primary-dim);border-color:var(--primary);color:var(--primary)}

    /* Forms */
    input[type="number"],input[type="text"],textarea{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font-body);font-size:0.72rem;padding:8px 10px;width:100%;outline:none}
    input:focus,textarea:focus{border-color:var(--primary)}
    input::placeholder,textarea::placeholder{color:var(--text-muted)}
    textarea{resize:vertical;line-height:1.6}
    input[type="range"]{-webkit-appearance:none;width:100%;height:4px;background:rgba(255,255,255,0.06);border-radius:2px;outline:none}
    input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--primary);cursor:pointer}

    /* Check items */
    .check-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:rgba(255,255,255,0.015);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all 0.15s;user-select:none}
    .check-item:hover{background:rgba(255,255,255,0.03)}
    .check-item.checked{background:var(--primary-dim);border-color:rgba(26,107,90,0.2)}
    .check-box{width:16px;height:16px;border:2px solid var(--text-muted);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:0.5rem;font-weight:700;flex-shrink:0}
    .check-item.checked .check-box{border-color:var(--primary);background:var(--primary);color:#fff}
    .check-text{font-size:0.66rem;color:var(--text-secondary)}

    /* Polyvagal ladder */
    .pv-rung{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);margin-bottom:4px;cursor:pointer;transition:all 0.12s;border:1px solid transparent}
    .pv-rung:hover{border-color:rgba(255,255,255,0.04)}
    .pv-rung.selected{border-color:currentColor}
    .pv-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .pv-label{font-size:0.72rem;font-weight:600}
    .pv-desc{font-size:0.56rem;color:var(--text-muted);margin-top:1px}

    /* Progress dots */
    .progress-dots{display:flex;gap:4px;margin-bottom:14px}
    .progress-dots div{flex:1;height:3px;border-radius:2px;cursor:pointer;transition:background 0.2s}

    /* Stat cards */
    .stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;text-align:center}
    .stat-label{font-size:0.50rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px}
    .stat-value{font-size:0.88rem;font-weight:700}

    /* NS Badge */
    .ns-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:10px;font-size:0.52rem;font-weight:600}

    /* Crisis overlay */
    .crisis-overlay{position:fixed;inset:0;background:rgba(15,17,23,0.98);z-index:100;padding:24px;overflow-y:auto}
    .crisis-section{border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;cursor:pointer}
    .crisis-section-title{padding:12px 16px;font-size:0.76rem;font-weight:700;display:flex;align-items:center;gap:8px}

    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .fade-in{animation:fadeIn 0.2s ease-out}
    @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
    .sync-badge{display:inline-flex;align-items:center;gap:4px;font-size:0.50rem;font-weight:600;padding:3px 8px;border-radius:10px;white-space:nowrap}
    .sync-idle{color:var(--text-muted)}
    .sync-synced{color:var(--green);background:var(--green-dim)}
    .sync-pushing,.sync-pulling{color:var(--accent);background:var(--accent-dim)}
    .sync-error{color:var(--red);background:var(--red-dim)}
    .sync-connect{display:flex;align-items:center;gap:6px;width:100%;padding:7px 10px;border:1px solid var(--primary-dim);background:var(--primary-dim);color:var(--primary);font-family:var(--font-body);font-size:0.62rem;font-weight:600;border-radius:var(--radius-sm);cursor:pointer;margin-bottom:6px}
    @media(max-width:600px){.grid-3{grid-template-columns:1fr 1fr}}
  </style>
</head>

<script>
'use strict';
var h=React.createElement,useState=React.useState,useEffect=React.useEffect,useMemo=React.useMemo,useRef=React.useRef,createContext=React.createContext,useContext=React.useContext;

/* ── HELPERS ── */
function today(){return new Date().toISOString().slice(0,10)}
function now(){return new Date().toISOString()}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function dayLabel(d){return new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}
function timeLabel(iso){if(!iso)return'';var d=new Date(iso);return d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}
function weekStart(d){var dt=new Date(d+'T12:00:00');dt.setDate(dt.getDate()-dt.getDay());return dt.toISOString().slice(0,10)}

/* ── STORAGE ── */
var STORE_KEY='cory_life_interface_v2';
var _mem={};
var EMPTY_STORE={checkIns:[],pillarRatings:[],discoveries:{},settings:{},_lastModified:0};
function loadLocal(){try{var r;try{r=window.localStorage.getItem(STORE_KEY)}catch(e){}if(!r)r=_mem[STORE_KEY];return r?JSON.parse(r):JSON.parse(JSON.stringify(EMPTY_STORE))}catch(e){return JSON.parse(JSON.stringify(EMPTY_STORE))}}
function saveLocal(d){d._lastModified=Date.now();var s=JSON.stringify(d);try{window.localStorage.setItem(STORE_KEY,s)}catch(e){}_mem[STORE_KEY]=s}
function load(){return loadLocal()}
function save(d){saveLocal(d);driveQueueSync(d)}

/* ── GOOGLE DRIVE SYNC ── */
var GCAL_CLIENT_ID='907443974937-mttmnuq4d88kcrlgg59bh3b5nsbrhigq.apps.googleusercontent.com'; /* OAuth Client ID for Drive sync */
var DRIVE_DISCOVERY='https://www.googleapis.com/discovery/v1/apis/drive/v3/rest';
var DRIVE_SCOPE='https://www.googleapis.com/auth/drive.file';
var DRIVE_FOLDER='Cory Dashboards';
var DRIVE_FILE='life_interface_sync.json';
var _driveSync={folderId:null,fileId:null,status:'idle',lastSync:null,timer:null};
var _driveSyncListeners=[];
function onDriveSyncChange(fn){_driveSyncListeners.push(fn)}
function _notifyDrive(){_driveSyncListeners.forEach(function(fn){fn({status:_driveSync.status,lastSync:_driveSync.lastSync})})}
function _setDriveStatus(s){_driveSync.status=s;_notifyDrive()}

function driveQueueSync(data){
  if(!GCAL_CLIENT_ID||!window.gapi||!gapi.client||!gapi.client.drive)return;
  clearTimeout(_driveSync.timer);
  _driveSync.timer=setTimeout(function(){driveWriteData(data)},2000);
}

function driveEnsureFolder(){
  if(_driveSync.folderId)return Promise.resolve(_driveSync.folderId);
  return gapi.client.drive.files.list({q:"name='"+DRIVE_FOLDER+"' and mimeType='application/vnd.google-apps.folder' and trashed=false",spaces:'drive',fields:'files(id)'}).then(function(r){
    if(r.result.files&&r.result.files.length>0){_driveSync.folderId=r.result.files[0].id;return _driveSync.folderId}
    return gapi.client.drive.files.create({resource:{name:DRIVE_FOLDER,mimeType:'application/vnd.google-apps.folder'},fields:'id'}).then(function(c){_driveSync.folderId=c.result.id;return _driveSync.folderId});
  });
}
function driveEnsureFile(folderId){
  if(_driveSync.fileId)return Promise.resolve(_driveSync.fileId);
  return gapi.client.drive.files.list({q:"name='"+DRIVE_FILE+"' and '"+folderId+"' in parents and trashed=false",spaces:'drive',fields:'files(id,modifiedTime)'}).then(function(r){
    if(r.result.files&&r.result.files.length>0){_driveSync.fileId=r.result.files[0].id;return _driveSync.fileId}
    return null;
  });
}
function driveReadData(){
  _setDriveStatus('pulling');
  return driveEnsureFolder().then(function(fid){
    return driveEnsureFile(fid).then(function(fileId){
      if(!fileId){_setDriveStatus('idle');return null}
      return gapi.client.drive.files.get({fileId:fileId,alt:'media'}).then(function(r){
        _setDriveStatus('idle');_driveSync.lastSync=Date.now();_notifyDrive();return r.result;
      });
    });
  }).catch(function(e){_setDriveStatus('error');console.warn('Drive read error',e);return null});
}
function driveWriteData(data){
  _setDriveStatus('pushing');
  driveEnsureFolder().then(function(fid){
    var body=JSON.stringify(data);
    var boundary='--cory-sync--';
    var meta=_driveSync.fileId?{}:{name:DRIVE_FILE,parents:[fid],mimeType:'application/json'};
    var multipart='--'+boundary+'\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n'+JSON.stringify(meta)+'\r\n--'+boundary+'\r\nContent-Type: application/json\r\n\r\n'+body+'\r\n--'+boundary+'--';
    var path=_driveSync.fileId?'/upload/drive/v3/files/'+_driveSync.fileId:'/upload/drive/v3/files';
    var method=_driveSync.fileId?'PATCH':'POST';
    return gapi.client.request({path:path+'?uploadType=multipart',method:method,headers:{'Content-Type':'multipart/related; boundary='+boundary},body:multipart});
  }).then(function(r){
    if(r&&r.result&&r.result.id)_driveSync.fileId=r.result.id;
    _driveSync.lastSync=Date.now();_setDriveStatus('synced');
    setTimeout(function(){_setDriveStatus('idle');_notifyDrive()},2000);
  }).catch(function(e){_setDriveStatus('error');console.warn('Drive write error',e)});
}
function drivePullAndMerge(callback){
  driveReadData().then(function(remote){
    if(!remote){callback(null);return}
    var local=loadLocal();
    if(remote._lastModified&&remote._lastModified>local._lastModified){
      /* Remote newer: use remote, merge local-only check-ins by id */
      var merged=JSON.parse(JSON.stringify(remote));
      if(local.checkIns){var remIds={};(merged.checkIns||[]).forEach(function(c){remIds[c.id]=true});
        local.checkIns.forEach(function(c){if(!remIds[c.id])merged.checkIns.push(c)})}
      saveLocal(merged);callback(merged);
    } else {driveQueueSync(local);callback(null)}
  });
}

function Timer(props){
  var _t=useState(props.seconds||60);var left=_t[0];var setLeft=_t[1];
  var _r=useState(false);var running=_r[0];var setRunning=_r[1];
  var ref=useRef(null);
  useEffect(function(){
    if(!running)return;
    ref.current=setInterval(function(){setLeft(function(p){if(p<=1){clearInterval(ref.current);setRunning(false);return 0}return p-1})},1000);
    return function(){clearInterval(ref.current)}},[running]);
  var mm=Math.floor(left/60);var ss=left%60;
  return h('div',{style:{display:'flex',alignItems:'center',gap:8}},
    h('span',{style:{fontSize:'0.78rem',fontWeight:700,fontFamily:'monospace',minWidth:48}},mm+':'+(ss<10?'0':'')+ss),
    h('button',{className:'btn-ghost',onClick:function(){setRunning(!running)}},running?'Pause':'Start'),
    h('button',{className:'btn-ghost',onClick:function(){setLeft(props.seconds||60);setRunning(false)}},'Reset'));
}

function Sparkline(props){
  var data=props.data||[];if(data.length<2)return null;
  var w=props.width||100;var ht=props.height||24;
  var mn=Math.min.apply(null,data);var mx=Math.max.apply(null,data);var range=mx-mn||1;
  var pts=data.map(function(v,i){return(i/(data.length-1))*w+','+(ht-2-((v-mn)/range)*(ht-4))}).join(' ');
  return h('svg',{width:w,height:ht,style:{display:'block'}},
    h('polyline',{points:pts,fill:'none',stroke:props.color||'var(--primary)',strokeWidth:1.5,strokeLinecap:'round'}));
}

function WheelOfLife(props){
  var pillars=props.pillars||[];var ratings=props.ratings||{};
  var n=pillars.length;if(!n)return null;
  var size=props.size||220;var cx=size/2;var cy=size/2;var maxR=size/2-28;
  function point(i,r){var a=(2*Math.PI*i/n)-Math.PI/2;return[cx+r*Math.cos(a),cy+r*Math.sin(a)]}
  var gridCircles=[2,4,6,8,10].map(function(v){return h('circle',{key:'g'+v,cx:cx,cy:cy,r:maxR*v/10,fill:'none',stroke:'rgba(255,255,255,0.04)',strokeWidth:1})});
  var axes=pillars.map(function(p,i){var pt=point(i,maxR);
    return h('g',{key:'a'+i},
      h('line',{x1:cx,y1:cy,x2:pt[0],y2:pt[1],stroke:'rgba(255,255,255,0.04)',strokeWidth:1}),
      h('text',{x:pt[0]<cx?pt[0]-4:pt[0]+4,y:pt[1]<cy?pt[1]-8:pt[1]+14,
        textAnchor:pt[0]<cx-5?'end':pt[0]>cx+5?'start':'middle',
        fill:'var(--text-muted)',fontSize:'0.52rem',fontWeight:600},p.icon))});
  var dataPoints=pillars.map(function(p,i){return point(i,maxR*(ratings[p.id]||p.rating||5)/10)});
  var poly=dataPoints.map(function(p){return p[0]+','+p[1]}).join(' ');
  return h('svg',{width:size,height:size,viewBox:'0 0 '+size+' '+size},
    gridCircles,axes,
    h('polygon',{points:poly,fill:'rgba(26,107,90,0.12)',stroke:'var(--primary)',strokeWidth:1.5,strokeLinejoin:'round'}),
    dataPoints.map(function(pt,i){return h('circle',{key:'d'+i,cx:pt[0],cy:pt[1],r:4,fill:pillars[i].color,stroke:'var(--bg)',strokeWidth:2})}));
}

        h(WheelOfLife,{pillars:pillars,ratings:ratings,size:240})),

  }

  /* ── REVIEW SCREEN ── */
  function ReviewScreen(){
    var pillars=DEFAULT_PILLARS;
    var _ratings=useState(function(){var r={};pillars.forEach(function(p){r[p.id]=5});return r});
    var ratings=_ratings[0];var setRatings=_ratings[1];
    var _reflection=useState('');var reflection=_reflection[0];var setReflection=_reflection[1];
    var _saved=useState(false);var saved=_saved[0];var setSaved=_saved[1];

    function saveReview(){
      updateStore(function(s){s.pillarRatings=[{id:uid(),date:today(),ratings:ratings,reflection:reflection,created:now()}].concat(s.pillarRatings)});
      setSaved(true);
    }

    if(saved)return h('div',{className:'fade-in card',style:{textAlign:'center',padding:32}},

    return h('div',{className:'fade-in'},
      h('h1',{style:{fontFamily:'var(--font-heading)',fontSize:'1.1rem',marginBottom:12}},'Weekly Review'),
      h('div',{className:'card',style:{display:'flex',justifyContent:'center',marginBottom:12}},
        h(WheelOfLife,{pillars:pillars,ratings:ratings,size:200})),
      h('div',{className:'card'},
        pillars.map(function(p){

            h(Slider,{label:p.icon+' '+p.name,value:ratings[p.id]||5,color:p.color,max:10,
              onChange:function(v){var n=Object.assign({},ratings);n[p.id]=v;setRatings(n)}}))})),
      h('div',{className:'card'},

  }

  /* ── WEEK SCREEN ── */
  function WeekScreen(){
    var moodData=store.checkIns.slice(0,14).map(function(c){return c.mood}).reverse();
    var energyData=store.checkIns.slice(0,14).map(function(c){return c.energy||5}).reverse();

    var _weekOff=useState(0);var weekOff=_weekOff[0];var setWeekOff=_weekOff[1];
    var baseDate=new Date();baseDate.setDate(baseDate.getDate()-baseDate.getDay()-(weekOff*7));
    var days=[];
    for(var i=0;i<7;i++){var d=new Date(baseDate);d.setDate(d.getDate()+i);var iso=d.toISOString().slice(0,10);
      var dayCIs=store.checkIns.filter(function(c){return c.date===iso});
      days.push({date:iso,label:d.toLocaleDateString('en-US',{weekday:'short'}),dayNum:d.getDate(),checkIns:dayCIs})}

    function moodColor(m){return m>=7?'var(--green)':m>=4?'var(--amber)':'var(--red)'}

    return h('div',{className:'fade-in'},
      h('div',{className:'card-header'},
        h('h1',{style:{fontFamily:'var(--font-heading)',fontSize:'1.1rem'}},'Week Patterns'),
        h('div',{style:{display:'flex',gap:4}},
          h('button',{className:'btn-ghost',onClick:function(){setWeekOff(weekOff+1)}},'\u2190'),
          h('button',{className:'btn-ghost',onClick:function(){setWeekOff(0)}},'This Week'),
          weekOff>0&&h('button',{className:'btn-ghost',onClick:function(){setWeekOff(weekOff-1)}},'\u2192'))),
      /* Sparklines */
      h('div',{style:{display:'flex',gap:8,marginBottom:12}},
        h('div',{className:'stat-card',style:{flex:1}},
          h('div',{className:'stat-label'},'Mood Trend'),
          h('div',{style:{display:'flex',justifyContent:'center'}},h(Sparkline,{data:moodData,color:'var(--primary)',width:120,height:30}))),
        h('div',{className:'stat-card',style:{flex:1}},
          h('div',{className:'stat-label'},'Energy Trend'),
          h('div',{style:{display:'flex',justifyContent:'center'}},h(Sparkline,{data:energyData,color:'var(--green)',width:120,height:30})))),
      /* Mood heatmap */
      h('div',{className:'card'},
        h('div',{className:'card-title'},'Mood Heatmap'),
        h('div',{style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:6}},
          days.map(function(d){
            var avg=d.checkIns.length?Math.round(d.checkIns.reduce(function(s,c){return s+c.mood},0)/d.checkIns.length):null;
            return h('div',{key:d.date,style:{textAlign:'center'}},
              h('div',{style:{fontSize:'0.52rem',color:'var(--text-muted)',marginBottom:3}},d.label),
              h('div',{style:{width:34,height:34,borderRadius:6,background:avg?moodColor(avg):'rgba(255,255,255,0.03)',
                display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto',
                fontSize:'0.68rem',fontWeight:700,color:avg?'var(--bg)':'var(--text-muted)'}},avg||'\u00B7'))}))),
      /* NS heatmap */
      h('div',{className:'card'},
        h('div',{className:'card-title'},'Nervous System Pattern'),
        h('div',{style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:6}},
          days.map(function(d){
            var lastCI=d.checkIns[0];var ns=lastCI?lastCI.autonomicState:null;
            var st=ns?AUTONOMIC_STATES.find(function(x){return x.id===ns}):null;
            return h('div',{key:d.date+'ns',style:{textAlign:'center'}},
              h('div',{style:{fontSize:'0.52rem',color:'var(--text-muted)',marginBottom:3}},d.label),
              h('div',{style:{width:34,height:34,borderRadius:6,background:st?st.dimColor:'rgba(255,255,255,0.03)',
                display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto',fontSize:'0.80rem'}},st?st.icon:'\u00B7'))}))));
  }

  /* ── DISCOVER SCREEN ── */
  function DiscoverScreen(){
    var _domain=useState(null);var domain=_domain[0];var setDomain=_domain[1];
    var _prompt=useState(0);var prompt=_prompt[0];var setPrompt=_prompt[1];
    var _text=useState('');var text=_text[0];var setText=_text[1];

    var discoveries=store.discoveries||{};
    function getDisc(id){return discoveries[id]||{responses:{}}}

    function saveResponse(domainId,promptKey,val){
      updateStore(function(s){
        if(!s.discoveries)s.discoveries={};
        if(!s.discoveries[domainId])s.discoveries[domainId]={responses:{}};
        s.discoveries[domainId].responses[promptKey]=val;
        s.discoveries[domainId].lastUpdated=now()});
    }

    var completedCount=DISCOVER_DOMAINS.filter(function(d){var disc=getDisc(d.id);return d.prompts.every(function(p){return disc.responses[p.key]&&disc.responses[p.key].trim()})}).length;

    if(domain){
      var dom=DISCOVER_DOMAINS.find(function(d){return d.id===domain});
      var disc=getDisc(domain);var pr=dom.prompts[prompt];
      var savedText=disc.responses[pr.key]||'';
      useEffect(function(){setText(savedText)},[domain,prompt]);

      return h('div',{className:'fade-in'},
        h('div',{className:'card-header'},
          h('div',{style:{display:'flex',alignItems:'center',gap:8}},
            h('button',{className:'btn-ghost',onClick:function(){if(text!==savedText)saveResponse(domain,pr.key,text);setDomain(null)}},'\u2190'),
            h('span',{style:{fontSize:'1rem'}},dom.icon),
            h('h1',{style:{fontFamily:'var(--font-heading)',fontSize:'1rem'}},dom.name))),
        h('div',{style:{display:'flex',gap:4,marginBottom:10}},
          dom.prompts.map(function(p,i){
            var answered=disc.responses[p.key]&&disc.responses[p.key].trim();
            return h('button',{key:i,style:{flex:1,padding:'7px 6px',borderRadius:'var(--radius-sm)',fontSize:'0.58rem',fontWeight:i===prompt?700:500,
              background:i===prompt?dom.color+'20':'rgba(255,255,255,0.02)',
              color:i===prompt?dom.color:answered?'var(--green)':'var(--text-muted)',
              border:'1px solid '+(i===prompt?dom.color+'40':'var(--border)'),cursor:'pointer'},
              onClick:function(){if(text!==savedText)saveResponse(domain,pr.key,text);setPrompt(i)}},
              answered?'\u2713 ':'',(i+1)+'. '+p.label)})),
        h('div',{className:'card',style:{borderLeft:'3px solid '+dom.color}},
          h('div',{style:{fontSize:'0.78rem',fontWeight:700,marginBottom:6,color:dom.color}},pr.label),
          h('div',{style:{fontSize:'0.72rem',color:'var(--text)',marginBottom:10,lineHeight:1.5}},pr.q),
          h('div',{style:{fontSize:'0.58rem',color:'var(--text-muted)',marginBottom:10,padding:'6px 10px',background:'rgba(255,255,255,0.02)',borderRadius:'var(--radius-sm)',fontStyle:'italic'}},'\uD83D\uDCA1 ',pr.hint),
          h('textarea',{rows:5,placeholder:'Write freely...',value:text,style:{fontSize:'0.72rem',lineHeight:1.6},onChange:function(e){setText(e.target.value)}}),
          h('div',{style:{display:'flex',gap:6,marginTop:8}},
            h('button',{className:'btn-primary',style:{flex:1},onClick:function(){saveResponse(domain,pr.key,text);if(prompt<dom.prompts.length-1)setPrompt(prompt+1)}},
              prompt<dom.prompts.length-1?'Save & Next \u2192':'Save'),
            prompt>0&&h('button',{className:'btn-ghost',onClick:function(){saveResponse(domain,pr.key,text);setPrompt(prompt-1)}},'\u2190 Prev'))));
    }

    return h('div',{className:'fade-in'},
      h('div',{className:'card-header'},
        h('div',null,h('h1',{style:{fontFamily:'var(--font-heading)',fontSize:'1.1rem'}},'Discover'),
          h('div',{style:{fontSize:'0.60rem',color:'var(--text-muted)'}},'Guided self-exploration')),
        h('span',{style:{fontSize:'0.62rem',color:'var(--primary)',fontWeight:700}},completedCount+'/'+DISCOVER_DOMAINS.length+' complete')),
      h('div',{style:{height:4,borderRadius:2,background:'rgba(255,255,255,0.04)',marginBottom:12}},
        h('div',{style:{height:4,borderRadius:2,background:'var(--primary)',width:(completedCount/DISCOVER_DOMAINS.length*100)+'%',transition:'width 0.3s'}})),
      h('div',{className:'grid-3'},
        DISCOVER_DOMAINS.map(function(d){
          var disc=getDisc(d.id);
          var answered=d.prompts.filter(function(p){return disc.responses[p.key]&&disc.responses[p.key].trim()}).length;
          var complete=answered===d.prompts.length;
          return h('div',{key:d.id,className:'card',style:{cursor:'pointer',borderTop:'3px solid '+(complete?'var(--green)':answered?d.color:'var(--border)'),opacity:complete?0.7:1},
            onClick:function(){setDomain(d.id);setPrompt(0)}},
            h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}},
              h('span',{style:{fontSize:'1rem'}},d.icon),
              complete?h('span',{style:{fontSize:'0.48rem',color:'var(--green)',fontWeight:700}},'\u2713 DONE'):
              answered?h('span',{style:{fontSize:'0.48rem',color:d.color,fontWeight:600}},answered+'/4'):
              h('span',{style:{fontSize:'0.48rem',color:'var(--text-muted)'}},'Start \u2192')),
            h('div',{style:{fontSize:'0.68rem',fontWeight:700,marginBottom:2}},d.name),
            h('div',{style:{fontSize:'0.50rem',color:'var(--text-muted)',lineHeight:1.3}},d.desc))})));
  }

  /* ── CRISIS SCREEN ── */
  function CrisisOverlay(){
    var _expanded=useState('coping');var expanded=_expanded[0];var setExpanded=_expanded[1];
    var _checks=useState({});var checks=_checks[0];var setChecks=_checks[1];
    function toggleCheck(k){var n=Object.assign({},checks);n[k]=!n[k];setChecks(n)}
    var s=DEFAULT_SAFETY;

    return h('div',{className:'crisis-overlay fade-in'},
      h('div',{style:{maxWidth:600,margin:'0 auto'}},
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}},
          h('div',null,
            h('h1',{style:{fontFamily:'var(--font-heading)',fontSize:'1.2rem'}},'Crisis Support'),
            h('div',{style:{fontSize:'0.66rem',color:'var(--text-muted)',marginTop:3}},'You are not alone. This will pass.')),
          h('button',{className:'btn-ghost',onClick:function(){setCrisis(false)}},'\u2715 Close')),
        /* Quick message templates */
        h('div',{className:'grid-3',style:{marginBottom:14}},
          s.messageTemplates.map(function(mt,i){
            return h('button',{key:i,className:'btn-ghost',style:{textAlign:'center',padding:'10px 8px'},
              onClick:function(){if(navigator.clipboard)navigator.clipboard.writeText(mt.text)}},
              h('div',{style:{fontSize:'0.68rem',fontWeight:600}},mt.label),
              h('div',{style:{fontSize:'0.50rem',color:'var(--text-muted)',marginTop:2}},'Tap to copy'))})),
        /* Coping steps */
        h('div',{className:'crisis-section',onClick:function(){setExpanded(expanded==='coping'?null:'coping')}},
          h('div',{className:'crisis-section-title'},'\uD83E\uDDCA Coping Steps'),
          expanded==='coping'&&h('div',{style:{padding:'0 16px 12px'},onClick:function(e){e.stopPropagation()}},
            s.copingSteps.map(function(cs,i){
              return h('div',{key:i,style:{marginBottom:8}},
                h('div',{className:'check-item'+(checks['c'+i]?' checked':''),onClick:function(){toggleCheck('c'+i)}},
                  h('div',{className:'check-box'},checks['c'+i]?'\u2713':''),
                  h('div',{className:'check-text'},cs.text)),
                cs.timer>0&&h('div',{style:{marginTop:4,marginLeft:28}},h(Timer,{seconds:cs.timer})))}))),
        /* Warning signs */
        h('div',{className:'crisis-section',onClick:function(){setExpanded(expanded==='warn'?null:'warn')}},
          h('div',{className:'crisis-section-title'},'\u26A0\uFE0F Warning Signs'),
          expanded==='warn'&&h('div',{style:{padding:'0 16px 12px'},onClick:function(e){e.stopPropagation()}},
            s.warnings.map(function(w,i){
              return h('div',{key:i,className:'check-item'+(checks['w'+i]?' checked':''),style:{marginBottom:4},onClick:function(){toggleCheck('w'+i)}},
                h('div',{className:'check-box'},checks['w'+i]?'\u2713':''),h('div',{className:'check-text'},w))}))),
        /* Reasons */
        h('div',{className:'crisis-section',onClick:function(){setExpanded(expanded==='reasons'?null:'reasons')}},
          h('div',{className:'crisis-section-title'},'\uD83D\uDC9A Reasons to Live'),
          expanded==='reasons'&&h('div',{style:{padding:'0 16px 12px'},onClick:function(e){e.stopPropagation()}},
            s.reasons.map(function(r,i){return h('div',{key:i,className:'check-item checked',style:{marginBottom:4}},
              h('div',{className:'check-box'},'\u2665'),h('div',{className:'check-text'},r))}))),
        /* Contacts */
        h('div',{className:'crisis-section',onClick:function(){setExpanded(expanded==='contacts'?null:'contacts')}},
          h('div',{className:'crisis-section-title'},'\uD83D\uDCF1 Professional Contacts'),
          expanded==='contacts'&&h('div',{style:{padding:'0 16px 12px'},onClick:function(e){e.stopPropagation()}},
            s.professionals.map(function(p,i){
              return h('div',{key:i,style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'6px 10px',
                background:'rgba(255,255,255,0.02)',borderRadius:'var(--radius-sm)',marginBottom:4}},
                h('div',null,
                  h('div',{style:{fontSize:'0.68rem',fontWeight:600}},p.name),
                  p.role&&h('div',{style:{fontSize:'0.54rem',color:'var(--text-muted)'}},p.role)),
                p.phone&&h('a',{href:'tel:'+p.phone,style:{color:'var(--primary)',fontSize:'0.70rem',fontWeight:700,textDecoration:'none'},
                  onClick:function(e){e.stopPropagation()}},p.phone))})))
      ));
  }

  /* ── NAV ── */
  var NAV=[
    {section:'EXPLORE'},{id:'checkin',icon:'\uD83D\uDCDD',label:'Check In'},{id:'discover',icon:'\uD83C\uDF31',label:'Discover'},
    {section:'REFLECT'},{id:'pillars',icon:'\uD83C\uDFAF',label:'Pillars'},{id:'week',icon:'\uD83D\uDCC5',label:'Week'},{id:'review',icon:'\u2728',label:'Review'}
  ];

  var screens={checkin:CheckInScreen,pillars:PillarsScreen,week:WeekScreen,review:ReviewScreen,discover:DiscoverScreen};
  var Screen=screens[screen]||CheckInScreen;

  if(crisis)return h(CrisisOverlay,null);

  return h('div',{className:'app'},
    /* Sidebar (desktop) */
    h('div',{className:'sidebar'},
      h('div',{className:'sidebar-brand'},
        h('span',null,'SYSTEM'),h('h2',null,'Life Interface')),
      h('div',{className:'sidebar-nav'},
        NAV.map(function(item,i){
          if(item.section!=null)return h('div',{key:'s'+i,className:'sidebar-section'},item.section);
          return h('button',{key:item.id,className:screen===item.id?'active':'',
            onClick:function(){setScreen(item.id)}},h('span',null,item.icon),' ',item.label)})),
      h('div',{style:{marginTop:'auto',padding:'8px 0'}},
        GCAL_CLIENT_ID&&syncStatus!=='idle'&&h('div',{className:'sync-badge sync-'+syncStatus,style:{marginBottom:6,justifyContent:'center',width:'100%'}},
          syncStatus==='synced'?'\u2601 Synced':syncStatus==='pushing'?'\u2601 Saving...':syncStatus==='pulling'?'\u2601 Loading...':syncStatus==='error'?'\u2601 Sync error':''),
        GCAL_CLIENT_ID&&!_driveSync.fileId&&syncStatus==='idle'&&h('button',{className:'sync-connect',onClick:connectDrive},'\u2601 Connect Drive Sync'),
        h('button',{className:'sidebar-crisis',onClick:function(){setCrisis(true)}},'\uD83D\uDEA8 Crisis Plan'))),
    /* Mobile header */
    h('div',{className:'mobile-header'},
      h('div',{style:{fontFamily:'var(--font-heading)',fontSize:'0.84rem'}},'Life Interface'),
      h('button',{style:{color:'var(--red)',fontSize:'0.66rem',fontWeight:700,background:'none',border:'none',cursor:'pointer'},onClick:function(){setCrisis(true)}},'\uD83D\uDEA8 Crisis')),
    h('div',{className:'mobile-tabs'},
      NAV.filter(function(n){return n.id}).map(function(item){
        return h('button',{key:item.id,className:screen===item.id?'active':'',
          onClick:function(){setScreen(item.id)}},item.icon,' ',item.label)})),
    /* Main content */
    h('div',{className:'main'},h(Screen,null)));
}

ReactDOM.render(h(App,null),document.getElementById('root'));

if('serviceWorker' in navigator){
  var sw='self.addEventListener("install",function(e){self.skipWaiting()});self.addEventListener("activate",function(e){e.waitUntil(clients.claim())});self.addEventListener("fetch",function(e){e.respondWith(fetch(e.request).catch(function(){return new Response("Offline")}))})';
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(function(){});
}
</script>
