    .tab-bar{display:flex;gap:4px;margin-bottom:8px}
    .tab-btn{flex:1;padding:6px 8px;border-radius:var(--radius-sm);font-size:0.58rem;font-weight:600;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;text-align:center;transition:all 0.12s}

    @media(max-width:600px){.grid-3{grid-template-columns:1fr 1fr}}

    .wheel-touch-area{cursor:pointer}
    .wheel-touch-area:hover{opacity:0.85}
    /* Today task assign button */
    .assign-btn{background:none;border:1px dashed var(--border);border-radius:var(--radius-sm);padding:3px 8px;font-size:0.52rem;color:var(--text-muted);cursor:pointer;font-family:var(--font-body);transition:all 0.12s}
    .assign-btn:hover{border-color:var(--accent);color:var(--accent)}
    .assign-btn.assigned{border-style:solid;border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}

    .modal-sheet{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:800px;max-height:80vh;overflow-y:auto;padding:20px 16px;animation:slideUp 0.2s ease-out}

    .timeline-line{position:absolute;left:15px;top:0;bottom:0;width:2px;background:var(--border)}

  </style>
