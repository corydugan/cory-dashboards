    .card-title{font-family:var(--font-heading);font-size:0.84rem;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:8px}
    .card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .stats-strip{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}

    .add-task-row{display:flex;gap:6px;margin-top:8px}

    .add-task-btn{background:var(--primary);color:#fff;border:none;border-radius:var(--radius-sm);padding:6px 12px;font-size:0.66rem;font-weight:700;cursor:pointer;white-space:nowrap}

    .summary-strip{display:flex;justify-content:space-between;align-items:center}
    .summary-done{font-size:0.68rem;font-weight:600}
    .summary-details{font-size:0.56rem;color:var(--text-muted);display:flex;gap:6px;flex-wrap:wrap}

    .ns-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:10px;font-size:0.52rem;font-weight:600}

    .step-indicator{display:flex;align-items:center;gap:8px;margin-bottom:12px}
    .step-dot{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:0.56rem;font-weight:700;color:var(--text-muted);transition:all 0.2s;cursor:pointer}
    .step-dot.done{border-color:var(--primary);background:var(--primary);color:#fff}
    .step-dot.current{border-color:var(--primary);color:var(--primary)}
    .step-line{flex:1;height:2px;background:var(--border);transition:background 0.2s}
    .step-line.done{background:var(--primary)}
    .milestone-card{padding:10px 12px;background:rgba(255,255,255,0.015);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px;cursor:pointer;transition:all 0.15s}
    .milestone-card:hover{background:rgba(255,255,255,0.03)}
  </style>
