<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f1117">
  <title>Life OS</title>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#0f1117;--bg-card:#161921;--bg-hover:#1c1f2a;
      --border:rgba(255,255,255,0.06);--border-subtle:rgba(255,255,255,0.03);
      --text:#e8e8ea;--text-sec:#a0a0aa;--text-muted:#5a5a66;
      --green:#34d399;--green-dim:rgba(52,211,153,0.10);
      --red:#f87171;--red-dim:rgba(248,113,113,0.10);
      --purple:#a78bfa;--purple-dim:rgba(167,139,250,0.10);
      --blue:#60a5fa;--blue-dim:rgba(96,165,250,0.10);
      --pink:#f472b6;--pink-dim:rgba(244,114,182,0.10);
      --amber:#fbbf24;--amber-dim:rgba(251,191,36,0.10);
      --rose:#fb7185;--rose-dim:rgba(251,113,133,0.10);
      --cyan:#22d3ee;--cyan-dim:rgba(34,211,238,0.10);
      --orange:#fb923c;--orange-dim:rgba(251,146,60,0.10);
      --teal:#2dd4bf;--teal-dim:rgba(45,212,191,0.10);
      --r:12px;--rs:8px;
      --fh:'Source Serif 4',serif;--fb:'DM Sans',sans-serif;
    }
    body{font-family:var(--fb);background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh;min-height:100dvh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
    .top-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;padding-top:calc(env(safe-area-inset-top,10px) + 6px);border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:20}
    .top-bar h1{font-family:var(--fh);font-size:1.05rem;font-weight:600}
    .top-bar .sub{font-size:0.54rem;color:var(--text-muted);margin-top:1px}
    .top-actions{display:flex;gap:6px;align-items:center}
    .main{padding:12px 16px;padding-bottom:85px;max-width:520px;margin:0 auto}
    /* Bottom nav */
    .nav{position:fixed;bottom:0;left:0;right:0;display:flex;background:#0c0e14;border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom,6px);z-index:20}
    .nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 4px;border:none;background:transparent;color:var(--text-muted);font-family:var(--fb);font-size:0.46rem;font-weight:500;cursor:pointer;transition:color 0.12s}
    .nav button.on{color:var(--teal)}
    .nav .ico{font-size:1.05rem;line-height:1}
    /* Cards */
    .card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:10px}
    .card-t{font-family:var(--fh);font-size:0.82rem;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:8px}
    .card-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    /* Buttons */
    .btn{background:var(--teal);color:#0f1117;border:none;border-radius:var(--rs);padding:10px 20px;font-family:var(--fb);font-size:0.70rem;font-weight:700;cursor:pointer;width:100%;transition:opacity 0.12s}
    .btn:hover{opacity:0.85}
    .btn:active{transform:scale(0.98)}
    .btn-s{background:transparent;color:var(--text-muted);border:1px solid var(--border);border-radius:var(--rs);padding:5px 12px;font-family:var(--fb);font-size:0.58rem;font-weight:500;cursor:pointer}
    .btn-s:hover{color:var(--text-sec);border-color:var(--text-muted)}
    .btn-danger{background:var(--red-dim);color:var(--red);border:1px solid rgba(248,113,113,0.2)}
    /* Pills */
    .pill{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:16px;font-size:0.58rem;font-weight:600;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;transition:all 0.12s;user-select:none}
    .pill:hover{border-color:var(--teal);color:var(--text-sec)}
    .pill.on{background:rgba(45,212,191,0.10);border-color:var(--teal);color:var(--teal)}
    /* State pills (bigger, for regulate) */
    .state-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:12px 8px;border-radius:var(--r);border:2px solid var(--border);background:var(--bg-card);cursor:pointer;transition:all 0.15s;flex:1;min-width:0;text-align:center}
    .state-btn .sico{font-size:1.3rem}
    .state-btn .slbl{font-size:0.52rem;font-weight:600;color:var(--text-muted);line-height:1.2}
    .state-btn.on{border-color:currentColor}
    /* Inputs */
    input[type="text"],input[type="number"],textarea{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-family:var(--fb);font-size:0.70rem;padding:8px 12px;width:100%;outline:none;transition:border-color 0.15s}
    input:focus,textarea:focus{border-color:var(--teal)}
    input::placeholder,textarea::placeholder{color:var(--text-muted)}
    textarea{resize:vertical;line-height:1.6}
    /* Slider */
    input[type="range"]{-webkit-appearance:none;width:100%;height:4px;background:rgba(255,255,255,0.06);border-radius:2px;outline:none}
    input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--teal);cursor:pointer}
    /* Grid */
    .g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .g3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .g5{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
    /* Section label */
    .slbl{font-size:0.50rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px;margin:14px 0 6px}
    /* Progress bar */
    .pbar{height:4px;border-radius:2px;background:rgba(255,255,255,0.04);overflow:hidden}
    .pbar .fill{height:100%;border-radius:2px;transition:width 0.3s}
    /* Progress dots */
    .pdots{display:flex;gap:4px;margin-bottom:12px}
    .pdots div{flex:1;height:3px;border-radius:2px;cursor:pointer;transition:background 0.15s}
    /* Animations */
    @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
    .fi{animation:fadeIn 0.2s ease-out}
    @keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
    .pop{animation:pop 0.2s ease-out}
    /* Mood faces */
    .face-row{display:flex;gap:6px;justify-content:center}
    .face-btn{width:44px;height:44px;border-radius:50%;border:2px solid var(--border);background:var(--bg-card);display:flex;align-items:center;justify-content:center;font-size:1.3rem;cursor:pointer;transition:all 0.12s}
    .face-btn.on{border-color:var(--teal);background:var(--teal-dim);transform:scale(1.1)}
    /* Check items */
    .chk{display:flex;align-items:center;gap:8px;padding:7px 10px;background:rgba(255,255,255,0.015);border:1px solid var(--border);border-radius:var(--rs);cursor:pointer;transition:all 0.12s;user-select:none}
    .chk:hover{background:rgba(255,255,255,0.03)}
    .chk.on{background:var(--teal-dim);border-color:rgba(45,212,191,0.2)}
    .chk-box{width:16px;height:16px;border:2px solid var(--text-muted);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:0.5rem;font-weight:700;flex-shrink:0;transition:all 0.15s}
    .chk.on .chk-box{border-color:var(--teal);background:var(--teal);color:#0f1117}
    .chk-txt{font-size:0.64rem;color:var(--text-sec)}
    .chk.on .chk-txt{color:var(--teal)}
    /* Insight card */
    .ins{display:flex;gap:8px;padding:8px 12px;background:var(--amber-dim);border:1px solid rgba(251,191,36,0.15);border-radius:var(--rs);margin-bottom:6px;align-items:flex-start}
    .ins .iico{font-size:0.8rem;flex-shrink:0;margin-top:1px}
    .ins .itxt{font-size:0.60rem;color:var(--amber);line-height:1.4;flex:1}
    /* Task items */
    .tsk{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--border-subtle)}
    .tsk:last-child{border-bottom:none}
    .tsk-chk{width:18px;height:18px;border:2px solid var(--text-muted);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:0.5rem;font-weight:700;flex-shrink:0;cursor:pointer;margin-top:1px;transition:all 0.15s}
    .tsk-chk.done{border-color:var(--teal);background:var(--teal);color:#0f1117}
    .tsk-title{font-size:0.66rem;font-weight:600;color:var(--text-sec);line-height:1.3}
    .tsk-title.done{text-decoration:line-through;color:var(--text-muted)}
    .tsk-meta{font-size:0.50rem;color:var(--text-muted);margin-top:2px}
    /* Energy badges */
    .ebadge{font-size:0.46rem;padding:2px 7px;border-radius:10px;font-weight:700}
    .ebadge.low{background:var(--green-dim);color:var(--green)}
    .ebadge.med{background:var(--amber-dim);color:var(--amber)}
    .ebadge.high{background:var(--red-dim);color:var(--red)}
    /* Wheel SVG */
    .wheel-wrap{display:flex;justify-content:center;margin:8px 0 12px}
    /* Timeline */
    .timeline{position:relative;padding-left:24px}
    .timeline::before{content:'';position:absolute;left:11px;top:8px;bottom:8px;width:2px;background:var(--border)}
    .tl-dot{width:10px;height:10px;border-radius:50%;position:absolute;left:7px;z-index:1;border:2px solid var(--bg)}
    .tl-item{position:relative;margin-bottom:8px;padding:8px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--rs)}
    /* Modal */
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:50;display:flex;align-items:flex-end;justify-content:center}
    .modal-sheet{background:var(--bg-card);border-radius:16px 16px 0 0;padding:20px 16px;padding-bottom:calc(env(safe-area-inset-bottom,12px) + 16px);width:100%;max-width:520px;max-height:85vh;overflow-y:auto}
    /* Breathing circle */
    @keyframes breatheIn{from{transform:scale(0.6);opacity:0.5}to{transform:scale(1);opacity:1}}
    @keyframes breatheOut{from{transform:scale(1);opacity:1}to{transform:scale(0.6);opacity:0.5}}
    .breathe-circle{width:140px;height:140px;border-radius:50%;background:radial-gradient(circle,var(--teal-dim),transparent);border:2px solid var(--teal);display:flex;align-items:center;justify-content:center;margin:20px auto;font-family:var(--fh);font-size:0.9rem;font-weight:600;color:var(--teal)}
    /* Collapsed card */
    .card-col{cursor:pointer;padding:10px 16px}
    .card-col:hover{background:var(--bg-hover)}
    .summary{display:flex;justify-content:space-between;align-items:center}
    .s-done{font-size:0.66rem;font-weight:600}
    .s-tags{display:flex;gap:6px;flex-wrap:wrap;font-size:0.52rem;color:var(--text-muted)}
    /* Sparkline */
    .spark{display:block}
    /* Heatmap */
    .hm-row{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
    .hm-cell{aspect-ratio:1;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:0.50rem;font-weight:700;max-width:38px;margin:0 auto;width:100%}
    .hm-lbl{font-size:0.44rem;color:var(--text-muted);text-align:center;margin-bottom:2px}
    /* Values card */
    .vcard{padding:14px;border-radius:var(--r);border:2px solid var(--border);background:var(--bg-card);cursor:pointer;transition:all 0.15s;text-align:center}
    .vcard:hover{border-color:var(--teal)}
    .vcard.on{border-color:var(--teal);background:var(--teal-dim)}
    .vcard .vlbl{font-size:0.68rem;font-weight:700}
    .vcard .vdesc{font-size:0.50rem;color:var(--text-muted);margin-top:3px}
    /* Swipe hint */
    .swipe-hint{font-size:0.50rem;color:var(--text-muted);text-align:center;padding:4px 0}
    /* Mode badge */
    .mode-badge{font-size:0.48rem;font-weight:700;padding:3px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:0.5px}
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
var h=React.createElement,useState=React.useState,useEffect=React.useEffect,useMemo=React.useMemo,useCallback=React.useCallback,useRef=React.useRef;

/* ===== UNIFIED PILLAR MODEL ===== */
var PILLARS=[
  {id:'body',label:'Body & Energy',icon:'\uD83D\uDD25',color:'var(--orange)',dim:'var(--orange-dim)',order:1},
  {id:'emotions',label:'Emotions & NS',icon:'\uD83C\uDF0A',color:'var(--blue)',dim:'var(--blue-dim)',order:2},
  {id:'relationships',label:'Relationships',icon:'\u2764\uFE0F',color:'var(--pink)',dim:'var(--pink-dim)',order:3},
  {id:'work',label:'Work & Roles',icon:'\uD83D\uDCBC',color:'var(--teal)',dim:'var(--teal-dim)',order:4},
  {id:'time',label:'Time & Attention',icon:'\u23F3',color:'var(--purple)',dim:'var(--purple-dim)',order:5},
  {id:'home',label:'Home & Environment',icon:'\uD83C\uDFE1',color:'var(--rose)',dim:'var(--rose-dim)',order:6},
  {id:'meaning',label:'Meaning & Values',icon:'\u2728',color:'var(--amber)',dim:'var(--amber-dim)',order:7},
  {id:'admin',label:'Practical Admin',icon:'\uD83D\uDCCB',color:'var(--cyan)',dim:'var(--cyan-dim)',order:8}
];
function pillar(id){return PILLARS.find(function(p){return p.id===id})||PILLARS[0]}

/* ===== NERVOUS SYSTEM STATES ===== */
var NS_STATES=[
  {id:'calm',label:'Calm',icon:'\u2600\uFE0F',color:'var(--green)',dim:'var(--green-dim)',desc:'Safe, grounded, present'},
  {id:'activated',label:'Activated',icon:'\u26A1',color:'var(--amber)',dim:'var(--amber-dim)',desc:'Anxious, restless, racing'},
  {id:'overwhelmed',label:'Overwhelmed',icon:'\uD83C\uDF0A',color:'var(--orange)',dim:'var(--orange-dim)',desc:'Too much, can\'t think'},
  {id:'shutdown',label:'Shut Down',icon:'\u2744\uFE0F',color:'var(--blue)',dim:'var(--blue-dim)',desc:'Numb, foggy, frozen'},
  {id:'unsafe',label:'Unsafe',icon:'\uD83D\uDEA8',color:'var(--red)',dim:'var(--red-dim)',desc:'Need support now'}
];
function nsState(id){return NS_STATES.find(function(s){return s.id===id})||NS_STATES[0]}

/* ===== MOOD FACES ===== */
var MOODS=[{v:1,e:'\uD83D\uDE2B',l:'Awful'},{v:2,e:'\uD83D\uDE14',l:'Low'},{v:3,e:'\uD83D\uDE10',l:'Meh'},{v:4,e:'\uD83D\uDE0A',l:'Good'},{v:5,e:'\uD83E\uDD29',l:'Great'}];

/* ===== ENERGY LEVELS ===== */
var ENERGY_LEVELS=[
  {id:'survival',label:'Survival',icon:'\uD83D\uDECF\uFE0F',color:'var(--red)',desc:'Bare minimum only'},
  {id:'low',label:'Low',icon:'\uD83D\uDC22',color:'var(--orange)',desc:'Gentle tasks only'},
  {id:'medium',label:'Medium',icon:'\u2615',color:'var(--amber)',desc:'Normal capacity'},
  {id:'high',label:'High',icon:'\uD83D\uDD25',color:'var(--green)',desc:'Full steam'}
];

/* ===== REGULATION ACTIONS (state-specific) ===== */
var REG_ACTIONS={
  calm:[
    {id:'grounding',label:'Grounding practice',dur:'3 min',icon:'\uD83C\uDF3F',type:'guided'},
    {id:'plan',label:'Plan next 2 hours',dur:'2 min',icon:'\uD83D\uDCDD',type:'prompt'},
    {id:'gratitude',label:'Name 3 good things',dur:'1 min',icon:'\uD83D\uDE4F',type:'prompt'}
  ],
  activated:[
    {id:'paced-breathing',label:'Paced breathing (4-7-8)',dur:'3 min',icon:'\uD83D\uDCA8',type:'breathing'},
    {id:'five-senses',label:'5-4-3-2-1 grounding',dur:'2 min',icon:'\u270B',type:'guided'},
    {id:'cold-water',label:'Cold water on wrists',dur:'1 min',icon:'\uD83E\uDDCA',type:'action'},
    {id:'body-scan',label:'Quick body scan',dur:'5 min',icon:'\uD83E\uDDD8',type:'guided'}
  ],
  overwhelmed:[
    {id:'tip-skill',label:'TIPP: Temperature',dur:'1 min',icon:'\uD83E\uDDCA',type:'action'},
    {id:'paced-breathing',label:'Box breathing',dur:'3 min',icon:'\uD83D\uDCA8',type:'breathing'},
    {id:'safe-people',label:'Name 3 safe people',dur:'1 min',icon:'\uD83D\uDC65',type:'prompt'},
    {id:'micro-move',label:'Stand up & stretch',dur:'1 min',icon:'\uD83E\uDDD8',type:'action'}
  ],
  shutdown:[
    {id:'sensory',label:'Hold something warm/cold',dur:'1 min',icon:'\u2615',type:'action'},
    {id:'micro-move',label:'Wiggle fingers & toes',dur:'30 sec',icon:'\uD83D\uDC4B',type:'action'},
    {id:'music',label:'Put on a familiar song',dur:'3 min',icon:'\uD83C\uDFB5',type:'action'},
    {id:'orient',label:'Look around: name 5 objects',dur:'1 min',icon:'\uD83D\uDC41\uFE0F',type:'guided'}
  ],
  unsafe:[]
};

/* ===== DBT SKILL MODULES ===== */
var DBT_MODULES=[
  {id:'distress',name:'Distress Tolerance',icon:'\uD83D\uDEE1\uFE0F',color:'var(--red)',
   skills:[
     {id:'tipp',name:'TIPP',steps:['Temperature: ice on face/cold shower for 30s','Intense exercise: 10 jumping jacks or run in place','Paced breathing: inhale 4, hold 4, exhale 6','Progressive muscle relaxation: tense & release each muscle group']},
     {id:'stop',name:'STOP',steps:['Stop: freeze, don\'t react','Take a step back: breathe','Observe: what am I feeling? What\'s happening?','Proceed mindfully: what will help right now?']},
     {id:'radical-accept',name:'Radical Acceptance',steps:['Notice you are fighting reality','Remind yourself: this is what is, right now','Turn your mind toward acceptance (not approval)','Practice half-smile and willing hands','Ask: what can I do from here?']}
   ]},
  {id:'emotion',name:'Emotion Regulation',icon:'\uD83C\uDFA8',color:'var(--amber)',
   skills:[
     {id:'check-facts',name:'Check the Facts',steps:['What event triggered this emotion?','What am I interpreting or assuming?','What are the actual facts?','Does my emotional intensity fit the facts?','If not, what emotion fits the facts better?']},
     {id:'opposite-action',name:'Opposite Action',steps:['Name the emotion and its action urge','Is acting on this urge effective right now?','Identify the opposite action','Do the opposite ALL THE WAY','Repeat until the emotion shifts']},
     {id:'abc-please',name:'ABC PLEASE',steps:['Accumulate positives: do one pleasant thing today','Build mastery: do something that gives you competence','Cope ahead: plan for a difficult situation this week','PL: treat PhysicaL illness','E: balanced Eating','A: avoid mood-Altering substances','S: balanced Sleep','E: get Exercise']}
   ]},
  {id:'interpersonal',name:'Interpersonal',icon:'\uD83E\uDD1D',color:'var(--pink)',
   skills:[
     {id:'dear-man',name:'DEAR MAN',steps:['Describe the situation (facts only)','Express how you feel about it','Assert what you want clearly','Reinforce: explain why this helps them too','Mindful: stay on topic, broken record if needed','Appear confident: posture, tone, eye contact','Negotiate: be willing to give to get']},
     {id:'give',name:'GIVE',steps:['Gentle: no attacks, threats, or judging','Interested: listen, don\'t interrupt','Validate: acknowledge their feelings','Easy manner: use humor, be light']}
   ]},
  {id:'mindfulness',name:'Mindfulness',icon:'\uD83E\uDDD8',color:'var(--purple)',
   skills:[
     {id:'observe',name:'Observe & Describe',steps:['Sit comfortably for 60 seconds','Notice 3 things you can see','Notice 2 things you can hear','Notice 1 thing you can feel','Describe each without judgment: just the facts']},
     {id:'one-mindful',name:'One-Mindfully',steps:['Choose one activity you are about to do','Commit to doing ONLY that thing','When your mind wanders, gently return','Notice the richness of single-focus attention','Aim for just 5 minutes of this']}
   ]}
];

/* ===== VALUES CARDS (ACT/Brene Brown/VIA informed) ===== */
var VALUES_CARDS=[
  {id:'autonomy',label:'Autonomy',desc:'Freedom to make my own choices'},
  {id:'connection',label:'Connection',desc:'Deep bonds with others'},
  {id:'creativity',label:'Creativity',desc:'Making and expressing'},
  {id:'courage',label:'Courage',desc:'Acting despite fear'},
  {id:'curiosity',label:'Curiosity',desc:'Learning and exploring'},
  {id:'fairness',label:'Fairness',desc:'Justice and equity'},
  {id:'growth',label:'Growth',desc:'Becoming who I want to be'},
  {id:'health',label:'Health',desc:'Physical and mental wellbeing'},
  {id:'honesty',label:'Honesty',desc:'Truth and authenticity'},
  {id:'humor',label:'Humor',desc:'Lightness and play'},
  {id:'kindness',label:'Kindness',desc:'Compassion for self and others'},
  {id:'knowledge',label:'Knowledge',desc:'Understanding deeply'},
  {id:'purpose',label:'Purpose',desc:'Meaningful contribution'},
  {id:'security',label:'Security',desc:'Safety and stability'},
  {id:'service',label:'Service',desc:'Helping others thrive'},
  {id:'stability',label:'Stability',desc:'Predictability and calm'}
];

/* ===== DISCOVER JOURNEYS ===== */

var STORE_KEY='lifeOS_v4';var _mem={};
var EMPTY={
  pillars:PILLARS.map(function(p){return{id:p.id,active:true}}),
  settings:{},
  wheelSnapshots:[],

  promptResponses:[],

function loadStore(){
  try{
    var raw;try{raw=window.localStorage.getItem(STORE_KEY)}catch(e){}
    if(!raw)raw=_mem[STORE_KEY];
    if(raw){var d=JSON.parse(raw);if(d._v===4)return d}
    /* Migration from v1/v3 */
    var old;try{old=window.localStorage.getItem('cory_life_os_v1')}catch(e){}
    if(old){
      var o=JSON.parse(old);
      var s=JSON.parse(JSON.stringify(EMPTY));
      /* Migrate check-ins */
      if(o.checkIns)s.checkIns=o.checkIns.map(function(ci){return{id:ci.id,type:'regulate',createdAt:ci.date+'T'+(ci.time||'12:00'),mood:ci.mood,energy:ci.energy,nsState:ci.autonomicState==='ventral'?'calm':ci.autonomicState==='sympathetic'?'activated':ci.autonomicState==='dorsal'?'shutdown':'calm',emotion:ci.emotion||'',note:ci.note||'',tags:[]}});
      /* Migrate tasks */
      if(o.tasks)s.tasks=o.tasks.map(function(t){return{id:t.id,title:t.text,pillarIds:[],energyCost:'medium',status:t.done?'done':t.category==='waiting'?'waiting':'todo',nextAction:'',meta:t.meta||'',priority:t.priority||2,doneDate:t.doneDate||null}});
      /* Migrate wheel snapshots */
      if(o.pillarRatings&&o.pillarRatings.length){
        s.wheelSnapshots=o.pillarRatings.map(function(pr){
          var ratings={};if(pr.ratings)Object.keys(pr.ratings).forEach(function(k){
            /* Map old pillar IDs to new */
            var map={mind:'emotions',body:'body',career:'work',creative:'meaning',knowledge:'time',relationships:'relationships',finances:'admin',environment:'home'};
            var nk=map[k]||k;ratings[nk]=pr.ratings[k];
          });
          return{id:pr.id||uid(),createdAt:pr.created||(pr.date+'T12:00'),ratings:ratings,notes:'',topIssue:''}
        });
      }
      /* Migrate daily data */
      if(o.days){
        Object.keys(o.days).forEach(function(dk){
          var d=o.days[dk];
          if(d.morning_done){
            s.checkIns.push({id:uid(),type:'morning',createdAt:dk+'T07:30',mood:d.mood||3,energy:d.energy||3,nsState:'calm',sleepQuality:d.sleep_quality==='Good'?4:d.sleep_quality==='OK'?3:2,sleepHrs:parseFloat(d.sleep_hrs)||0,weight:parseFloat(d.weight)||0,tags:[]});
          }
          if(d.evening_done){
            s.checkIns.push({id:uid(),type:'evening',createdAt:dk+'T21:00',mood:d.mood||3,energy:d.energy||3,nsState:'calm',emotion:d.emotion||'',exercised:!!d.exercised,note:d.wins||'',tags:[]});
          }
        });
      }
      s._lastMod=Date.now();
      return s;
    }
    return JSON.parse(JSON.stringify(EMPTY));
  }catch(e){return JSON.parse(JSON.stringify(EMPTY))}
}
function saveStore(d){d._lastMod=Date.now();var s=JSON.stringify(d);try{window.localStorage.setItem(STORE_KEY,s)}catch(e){}_mem[STORE_KEY]=s}

/* ===== UTILS ===== */
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function today(){return new Date().toISOString().slice(0,10)}
function nowISO(){return new Date().toISOString()}
function timeOfDay(){var h=new Date().getHours();return h<12?'morning':h<17?'afternoon':'evening'}
function dayLabel(iso){if(!iso)return'';var d=new Date(iso+'T12:00:00');return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}
function relDay(iso){var t=today();if(iso===t)return'Today';var y=new Date();y.setDate(y.getDate()-1);if(iso===y.toISOString().slice(0,10))return'Yesterday';return dayLabel(iso)}
function timeLabel(iso){if(!iso)return'';try{return new Date(iso).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}catch(e){return''}}
function avg(arr){if(!arr.length)return 0;return Math.round(arr.reduce(function(a,b){return a+b},0)/arr.length*10)/10}
function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v))}

function Sparkline(p){
  var data=p.data||[];if(data.length<2)return null;
  var w=p.width||80;var ht=p.height||22;
  var mn=Math.min.apply(null,data);var mx=Math.max.apply(null,data);var range=mx-mn||1;
  var pts=data.map(function(v,i){return(i/(data.length-1))*w+','+(ht-2-((v-mn)/range)*(ht-4))}).join(' ');
  return h('svg',{width:w,height:ht,className:'spark'},
    h('polyline',{points:pts,fill:'none',stroke:p.color||'var(--teal)',strokeWidth:1.5,strokeLinecap:'round'}));
}

/* Life Wheel SVG (interactive) */
function WheelChart(p){
  var size=p.size||240;var cx=size/2;var cy=size/2;var maxR=size/2-20;
  var ratings=p.ratings||{};
  var n=PILLARS.length;var angleStep=2*Math.PI/n;var startAngle=-Math.PI/2;

  /* Build polygon points for current ratings */
  var polyPts=PILLARS.map(function(pl,i){
    var angle=startAngle+i*angleStep;
    var r=(ratings[pl.id]||5)/10*maxR;
    return(cx+r*Math.cos(angle))+','+(cy+r*Math.sin(angle));
  }).join(' ');

  /* Grid circles */
  var circles=[2,4,6,8,10].map(function(v){
    return h('circle',{key:v,cx:cx,cy:cy,r:v/10*maxR,fill:'none',stroke:'rgba(255,255,255,0.04)',strokeWidth:1});
  });

  /* Axis lines + labels */
  var axes=PILLARS.map(function(pl,i){
    var angle=startAngle+i*angleStep;
    var lx=cx+(maxR+14)*Math.cos(angle);
    var ly=cy+(maxR+14)*Math.sin(angle);
    return h('g',{key:pl.id},
      h('line',{x1:cx,y1:cy,x2:cx+maxR*Math.cos(angle),y2:cy+maxR*Math.sin(angle),stroke:'rgba(255,255,255,0.04)',strokeWidth:1}),
      h('text',{x:lx,y:ly,textAnchor:'middle',dominantBaseline:'middle',fill:pl.color,fontSize:9,fontWeight:600,fontFamily:'DM Sans'},pl.icon)
    );
  });

  /* Interactive dots */
  var dots=PILLARS.map(function(pl,i){
    var angle=startAngle+i*angleStep;
    var r=(ratings[pl.id]||5)/10*maxR;
    return h('circle',{key:pl.id+'d',cx:cx+r*Math.cos(angle),cy:cy+r*Math.sin(angle),r:6,fill:pl.color,stroke:'var(--bg)',strokeWidth:2,style:{cursor:'pointer'},
      onClick:function(){if(p.onSelect)p.onSelect(pl.id)}});
  });

  return h('svg',{width:size,height:size,viewBox:'0 0 '+size+' '+size,style:{display:'block',margin:'0 auto'}},
    circles,axes,
    h('polygon',{points:polyPts,fill:'rgba(45,212,191,0.08)',stroke:'var(--teal)',strokeWidth:1.5}),
    dots
  );
}

/* ===== REGULATE TAB ===== */
function RegulateTab(p){
  var store=p.store;var setStore=p.setStore;var setCrisis=p.setCrisis;
  var _mode=useState(null);var mode=_mode[0];var setMode=_mode[1];
  var _ns=useState('calm');var ns=_ns[0];var setNs=_ns[1];
  var _skill=useState(null);var activeSkill=_skill[0];var setActiveSkill=_skill[1];
  var _step=useState(0);var step=_step[0];var setStep=_step[1];
  var _breathPhase=useState(null);var breathPhase=_breathPhase[0];var setBreathPhase=_breathPhase[1];
  var _breathCount=useState(0);var breathCount=_breathCount[0];var setBreathCount=_breathCount[1];
  var _stateBefore=useState('');var stateBefore=_stateBefore[0];var setStateBefore=_stateBefore[1];
  var _helpful=useState(3);var helpful=_helpful[0];var setHelpful=_helpful[1];

  /* Recent regulation sessions */
  var recentSessions=store.regulationSessions?store.regulationSessions.slice(0,8):[];

  /* === BREATHING EXERCISE === */
  if(mode==='breathing'){
    var timerRef=useRef(null);
    var phases=[{label:'Breathe in',dur:4000},{label:'Hold',dur:7000},{label:'Breathe out',dur:8000}];
    var _bp=useState(0);var bpIdx=_bp[0];var setBpIdx=_bp[1];
    var _bc=useState(0);var bcycles=_bc[0];var setBcycles=_bc[1];
    var _running=useState(false);var running=_running[0];var setRunning=_running[1];

    function startBreathing(){
      setRunning(true);setBpIdx(0);setBcycles(0);
      runPhase(0,0);
    }
    function runPhase(pi,cy){
      if(cy>=4){setRunning(false);return;}
      setBpIdx(pi);setBcycles(cy);
      timerRef.current=setTimeout(function(){
        var next=pi+1;if(next>=3){next=0;cy++;}
        runPhase(next,cy);
      },phases[pi].dur);
    }
    function stopBreathing(){clearTimeout(timerRef.current);setRunning(false)}

    return h('div',{className:'fi'},
      h('div',{className:'card-hdr'},
        h('h2',{style:{fontFamily:'var(--fh)',fontSize:'1rem'}},'\uD83D\uDCA8 Paced Breathing'),
        h('button',{className:'btn-s',onClick:function(){stopBreathing();setMode(null)}},'\u2190 Back')
      ),
      h('div',{style:{textAlign:'center',marginTop:20}},
        h('div',{className:'breathe-circle',style:{animation:running?(bpIdx===0?'breatheIn 4s ease-in-out':'breatheOut 8s ease-in-out'):'none'}},
          running?phases[bpIdx].label:'Ready'
        ),
        running&&h('div',{style:{fontSize:'0.58rem',color:'var(--text-muted)',marginTop:8}},'Cycle '+(bcycles+1)+' of 4'),
        h('div',{style:{marginTop:16}},
          !running?h('button',{className:'btn',style:{maxWidth:200,margin:'0 auto'},onClick:startBreathing},'Start'):
          h('button',{className:'btn-s',onClick:stopBreathing},'Stop')
        )
      )
    );
  }

  /* === GUIDED DBT SKILL === */
  if(activeSkill){
    var mod=null;var sk=null;
    DBT_MODULES.forEach(function(m){m.skills.forEach(function(s){if(s.id===activeSkill){mod=m;sk=s}})});
    if(!sk){setActiveSkill(null);return null;}

    function finishSkill(){
      var session={id:uid(),createdAt:nowISO(),trigger:[],stateBefore:stateBefore||ns,stateAfter:ns,skillIds:[activeSkill],durationMinutes:Math.round((sk.steps.length*30)/60),helpfulness:helpful};
      setStore(function(s){if(!s.regulationSessions)s.regulationSessions=[];s.regulationSessions.unshift(session);return s});
      setActiveSkill(null);setStep(0);setStateBefore('');
    }

    var isLast=step>=sk.steps.length;

    return h('div',{className:'fi'},
      h('div',{className:'card-hdr'},
        h('div',null,
          h('h2',{style:{fontFamily:'var(--fh)',fontSize:'1rem'}},mod.icon,' ',sk.name),
          h('div',{style:{fontSize:'0.52rem',color:'var(--text-muted)'}},mod.name)
        ),
        h('button',{className:'btn-s',onClick:function(){setActiveSkill(null);setStep(0)}},'\u2190')
      ),
      /* Progress */
      h('div',{className:'pdots'},sk.steps.map(function(_,i){
        return h('div',{key:i,style:{background:i<step?'var(--teal)':i===step?mod.color:'rgba(255,255,255,0.06)'}});
      }).concat(h('div',{key:'end',style:{background:isLast?'var(--teal)':'rgba(255,255,255,0.06)'}}))),
      /* Current step or finish */
      isLast?h('div',{className:'card',style:{textAlign:'center'}},
        h('div',{style:{fontSize:'1.2rem',marginBottom:8}},'\u2705'),
        h('div',{style:{fontFamily:'var(--fh)',fontSize:'0.9rem',fontWeight:600,marginBottom:12}},'How are you now?'),
        h(StatePicker,{value:ns,onChange:setNs}),
        h('div',{style:{marginTop:12}},h(Slider,{label:'How helpful was this?',value:helpful,max:5,onChange:setHelpful,color:'var(--amber)'})),
        h('button',{className:'btn',style:{marginTop:12},onClick:finishSkill},'Save & Close')
      ):
      h('div',{className:'card'},
        h('div',{style:{fontSize:'0.48rem',fontWeight:700,color:mod.color,textTransform:'uppercase',letterSpacing:'1.5px',marginBottom:6}},'Step '+(step+1)+' of '+sk.steps.length),
        h('div',{style:{fontFamily:'var(--fh)',fontSize:'0.88rem',fontWeight:600,lineHeight:1.6,minHeight:60}},sk.steps[step])
      ),
      !isLast&&h('div',{style:{display:'flex',gap:6,marginTop:8}},
        step>0&&h('button',{className:'btn-s',onClick:function(){setStep(step-1)}},'\u2190 Prev'),
        h('button',{className:'btn',style:{flex:1},onClick:function(){setStep(step+1)}},step<sk.steps.length-1?'Next \u2192':'Finish'),
        step<sk.steps.length-2&&h('button',{className:'btn-s',onClick:function(){setStep(sk.steps.length)}},'Skip')
      )
    );
  }

  /* === REGULATE HOME === */
  return h('div',{className:'fi'},
    h('div',{className:'card-hdr'},
      h('div',null,
        h('h1',{style:{fontFamily:'var(--fh)',fontSize:'1.15rem'}},'Regulate'),
        h('div',{style:{fontSize:'0.56rem',color:'var(--text-muted)'}},'Where are you right now?')
      )
    ),
    /* State selector */
    h('div',{className:'card'},h(StatePicker,{value:ns,onChange:function(v){
      setNs(v);
      if(v==='unsafe')setCrisis(true);
    }})),
    /* State-specific actions */
    ns!=='unsafe'&&h('div',null,
      h('div',{className:'slbl'},'Shift your state'),
      (REG_ACTIONS[ns]||[]).map(function(a){
        return h('div',{key:a.id,className:'card',style:{cursor:'pointer',display:'flex',alignItems:'center',gap:10,padding:'12px 14px'},
          onClick:function(){

          }},
          h('div',{style:{fontSize:'1.1rem'}},a.icon),
          h('div',{style:{flex:1}},
            h('div',{style:{fontSize:'0.68rem',fontWeight:600}},a.label),
            h('div',{style:{fontSize:'0.50rem',color:'var(--text-muted)'}},a.dur)
          ),
          a.type==='breathing'&&h('span',{style:{fontSize:'0.50rem',color:'var(--teal)',fontWeight:600}},'\u25B6 Start')
        );
      })
    ),
    /* DBT Skills */
    h('div',{className:'slbl',style:{marginTop:16}},'DBT Skills'),
    DBT_MODULES.map(function(mod){
      return h('div',{key:mod.id,className:'card'},
        h('div',{className:'card-t',style:{color:mod.color}},mod.icon,' ',mod.name),
        h('div',{style:{display:'flex',flexWrap:'wrap',gap:4}},mod.skills.map(function(sk){
          return h('button',{key:sk.id,className:'pill',
            style:{borderColor:mod.color+'40'},
            onClick:function(){setStateBefore(ns);setActiveSkill(sk.id);setStep(0)}},
            sk.name,' \u2192');
        }))
      );
    }),
    /* Life Wheel quick check-in */
    h('div',{className:'slbl',style:{marginTop:16}},'Life Check-in'),
    h(LifeWheelCheckin,{store:store,setStore:setStore}),
    /* Recent sessions */

      h('div',{className:'slbl',style:{marginTop:16}},'Recent Sessions'),
      h('div',{className:'card'},recentSessions.map(function(s){
        var ns2=nsState(s.stateAfter||'calm');
        return h('div',{key:s.id,style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'4px 0',borderBottom:'1px solid var(--border-subtle)',fontSize:'0.56rem'}},
          h('div',{style:{display:'flex',gap:6,alignItems:'center'}},
            h('span',{style:{color:'var(--text-muted)'}},relDay(s.createdAt?s.createdAt.slice(0,10):'')),

/* Life Wheel Check-in (used in Regulate and Discover) */
function LifeWheelCheckin(p){
  var store=p.store;var setStore=p.setStore;
  var _editing=useState(false);var editing=_editing[0];var setEditing=_editing[1];
  var _selected=useState(null);var selected=_selected[0];var setSelected=_selected[1];

  /* Get latest snapshot ratings or defaults */
  var latest=store.wheelSnapshots&&store.wheelSnapshots.length?store.wheelSnapshots[0]:null;
  var _ratings=useState(function(){
    var r={};PILLARS.forEach(function(pl){r[pl.id]=latest?latest.ratings[pl.id]||5:5});return r;
  });
  var ratings=_ratings[0];var setRatings=_ratings[1];
  var _note=useState('');var wNote=_note[0];var setWNote=_note[1];

  function saveSnapshot(){
    var snap={id:uid(),createdAt:nowISO(),ratings:Object.assign({},ratings),notes:wNote,topIssue:''};
    /* Find lowest pillar */
    var lowest=null;var lowestVal=11;
    PILLARS.forEach(function(pl){if((ratings[pl.id]||5)<lowestVal){lowestVal=ratings[pl.id]||5;lowest=pl.id}});
    snap.topIssue=lowest||'';
    setStore(function(s){if(!s.wheelSnapshots)s.wheelSnapshots=[];s.wheelSnapshots.unshift(snap);return s});
    setEditing(false);setWNote('');

  if(!editing){

      h('div',{className:'card-t'},'\uD83C\uDFAF Life Wheel'),

          h('button',{className:'btn-s'},'New Check-in'))

        h('button',{className:'btn-s'},'Start Check-in'))

  return h('div',{className:'card fi'},
    h('div',{className:'card-hdr'},
      h('div',{className:'card-t'},'\uD83C\uDFAF Life Wheel Check-in'),
      h('button',{className:'btn-s',onClick:function(){setEditing(false)}},'\u2715')
    ),
    h(WheelChart,{ratings:ratings,size:220,onSelect:function(id){setSelected(selected===id?null:id)}}),
    /* Pillar sliders */

      var isOpen=selected===pl.id;

        h('div',{style:{display:'flex',alignItems:'center',gap:6,cursor:'pointer'},onClick:function(){setSelected(isOpen?null:pl.id)}},
          h('span',{style:{fontSize:'0.8rem'}},pl.icon),

          h('span',{style:{fontSize:'0.66rem',fontWeight:700,color:pl.color}},ratings[pl.id]||5),
          h('span',{style:{fontSize:'0.50rem',color:'var(--text-muted)'}},isOpen?'\u25B2':'\u25BC')
        ),
        isOpen&&h('div',{style:{paddingTop:6}},
          h('input',{type:'range',min:1,max:10,value:ratings[pl.id]||5,onChange:function(e){
            var v=parseInt(e.target.value);setRatings(function(r){var n=Object.assign({},r);n[pl.id]=v;return n});
          }}),
          h('div',{style:{display:'flex',justifyContent:'space-between',fontSize:'0.46rem',color:'var(--text-muted)'}},
            h('span',null,'Struggling'),h('span',null,'Thriving'))

      h('textarea',{rows:2,placeholder:'Any notes on this snapshot?',value:wNote,onChange:function(e){setWNote(e.target.value)}})

/* ===== DISCOVER TAB ===== */
function DiscoverTab(p){

  var _vSelected=useState(store.valuesState?store.valuesState.selected:[]);var vSelected=_vSelected[0];var setVSelected=_vSelected[1];
  var _vTop=useState(store.valuesState?store.valuesState.top:[]);var vTop=_vTop[0];var setVTop=_vTop[1];

  /* Wheel history */

      vSelected.indexOf(id)>=0?setVSelected(vSelected.filter(function(x){return x!==id})):setVSelected(vSelected.concat(id));
    }
    function toggleTop(id){
      vTop.indexOf(id)>=0?setVTop(vTop.filter(function(x){return x!==id})):

/* ===== PATTERNS TAB ===== */
function PatternsTab(p){
  var store=p.store;var setStore=p.setStore;

  /* Gather data */
  var checkIns=store.checkIns||[];
  var todayKey=today();

  /* Last 7 days of data */
  var last7days=[];
  for(var i=0;i<7;i++){
    var d=new Date();d.setDate(d.getDate()-i);
    var dk=d.toISOString().slice(0,10);
    var dayCIs=checkIns.filter(function(c){return c.createdAt&&c.createdAt.slice(0,10)===dk});
    last7days.push({date:dk,label:d.toLocaleDateString('en-US',{weekday:'short'}),checkIns:dayCIs,isToday:dk===todayKey});
  }
  last7days.reverse();

  /* Week stats */
  var weekMoods=[];var weekEnergy=[];var weekStates={};var weekHelped={};var weekDrained={};
  last7days.forEach(function(d){
    d.checkIns.forEach(function(ci){
      if(ci.mood)weekMoods.push(ci.mood);
      if(ci.energy)weekEnergy.push(ci.energy);
      if(ci.nsState){weekStates[ci.nsState]=(weekStates[ci.nsState]||0)+1}
      if(ci.helped)(ci.helped||[]).forEach(function(h){weekHelped[h]=(weekHelped[h]||0)+1});
      if(ci.drained)(ci.drained||[]).forEach(function(d){weekDrained[d]=(weekDrained[d]||0)+1});
    });
  });

  var avgMood=weekMoods.length?avg(weekMoods):null;
  var avgEnergy=weekEnergy.length?avg(weekEnergy):null;
  var topState=Object.keys(weekStates).sort(function(a,b){return weekStates[b]-weekStates[a]})[0];
  var topHelped=Object.keys(weekHelped).sort(function(a,b){return weekHelped[b]-weekHelped[a]}).slice(0,2);
  var topDrained=Object.keys(weekDrained).sort(function(a,b){return weekDrained[b]-weekDrained[a]}).slice(0,2);

  /* Check-in count */
  var ciCount=last7days.reduce(function(s,d){return s+d.checkIns.length},0);

  /* Wheel trends */
  var snapshots=store.wheelSnapshots||[];
  var latestSnap=snapshots[0];
  var prevSnap=snapshots[1];

  /* Build insights */
  var insights2=[];
  if(topDrained.length>0)insights2.push({icon:'\uD83D\uDD0B',text:'Top drainers this week: '+topDrained.join(', ')});
  if(topHelped.length>0)insights2.push({icon:'\u2705',text:'What helped most: '+topHelped.join(', ')});
  if(topState){var ts=nsState(topState);insights2.push({icon:ts.icon,text:'Most frequent state: '+ts.label})}
  if(latestSnap&&prevSnap){
    var improved=null;var dropped=null;var bestDelta=-99;var worstDelta=99;
    PILLARS.forEach(function(pl){
      var cur=latestSnap.ratings[pl.id]||5;var prev2=prevSnap.ratings[pl.id]||5;
      var d=cur-prev2;
      if(d>bestDelta){bestDelta=d;improved=pl}
      if(d<worstDelta){worstDelta=d;dropped=pl}
    });
    if(bestDelta>0&&improved)insights2.push({icon:'\uD83D\uDCC8',text:improved.label+' improved by '+bestDelta+' since last wheel'});
    if(worstDelta<0&&dropped)insights2.push({icon:'\uD83D\uDCC9',text:dropped.label+' dropped by '+Math.abs(worstDelta)+' since last wheel'});
  }

  /* Regulation sessions */
  var regSessions=store.regulationSessions||[];
  var weekRegs=regSessions.filter(function(s){
    if(!s.createdAt)return false;
    var d=new Date(s.createdAt);var diff=(new Date()-d)/(1000*60*60*24);
    return diff>=0&&diff<7;
  });

  return h('div',{className:'fi'},
    h('div',{className:'card-hdr'},
      h('h1',{style:{fontFamily:'var(--fh)',fontSize:'1.15rem'}},'Patterns')
    ),

    /* Week summary card */
    h('div',{className:'card',style:{borderLeft:'3px solid var(--amber)'}},
      h('div',{style:{fontSize:'0.48rem',fontWeight:700,color:'var(--amber)',textTransform:'uppercase',letterSpacing:'1px',marginBottom:8}},'This Week'),
      h('div',{style:{display:'flex',gap:12,marginBottom:8}},
        h('div',{style:{textAlign:'center'}},
          h('div',{style:{fontSize:'1.1rem',fontWeight:800,color:avgMood>=4?'var(--green)':avgMood>=3?'var(--amber)':'var(--red)'}},avgMood||'--'),
          h('div',{style:{fontSize:'0.44rem',color:'var(--text-muted)'}},'avg mood')
        ),
        h('div',{style:{textAlign:'center'}},
          h('div',{style:{fontSize:'1.1rem',fontWeight:800}},avgEnergy||'--'),
          h('div',{style:{fontSize:'0.44rem',color:'var(--text-muted)'}},'avg energy')
        ),
        h('div',{style:{textAlign:'center'}},
          h('div',{style:{fontSize:'1.1rem',fontWeight:800}},ciCount),
          h('div',{style:{fontSize:'0.44rem',color:'var(--text-muted)'}},'check-ins')
        ),
        h('div',{style:{textAlign:'center'}},
          h('div',{style:{fontSize:'1.1rem',fontWeight:800}},weekRegs.length),
          h('div',{style:{fontSize:'0.44rem',color:'var(--text-muted)'}},'reg sessions')
        )
      )
    ),

    /* Insights */
    insights2.length>0&&h('div',{style:{marginBottom:10}},insights2.map(function(ins,i){
      return h('div',{key:i,className:'ins fi'},
        h('span',{className:'iico'},ins.icon),
        h('span',{className:'itxt'},ins.text)
      );
    })),

    /* Mood heatmap */
    h('div',{className:'card'},
      h('div',{className:'card-t'},'Mood This Week'),
      h('div',{className:'hm-row'},last7days.map(function(d){
        var lastCI=d.checkIns.length?d.checkIns[d.checkIns.length-1]:null;
        var m=lastCI?lastCI.mood:null;
        var bg=m?m>=4?'var(--green)':m>=3?'var(--amber)':'var(--red)':'rgba(255,255,255,0.03)';
        return h('div',{key:d.date,style:{textAlign:'center'}},
          h('div',{className:'hm-lbl'},d.label),
          h('div',{className:'hm-cell',style:{background:bg,color:m?'var(--bg)':'var(--text-muted)',border:d.isToday?'2px solid var(--amber)':'1px solid var(--border)'}},
            m?MOODS.find(function(mo){return mo.v===m}).e:'\u00B7')
        );
      }))
    ),

    /* NS State heatmap */
    h('div',{className:'card'},
      h('div',{className:'card-t'},'Nervous System'),
      h('div',{className:'hm-row'},last7days.map(function(d){
        var lastCI=d.checkIns.length?d.checkIns[d.checkIns.length-1]:null;
        var nsId=lastCI?lastCI.nsState:null;
        var st=nsId?nsState(nsId):null;
        return h('div',{key:d.date+'ns',style:{textAlign:'center'}},
          h('div',{className:'hm-lbl'},d.label),
          h('div',{className:'hm-cell',style:{background:st?st.dim:'rgba(255,255,255,0.03)',border:d.isToday?'2px solid var(--amber)':'1px solid var(--border)'}},
            st?st.icon:'\u00B7')
        );
      }))
    ),

    /* Wheel trends (if snapshots exist) */
    snapshots.length>0&&h('div',{className:'card'},
      h('div',{className:'card-t'},'\uD83C\uDFAF Life Wheel Trends'),
      h('div',{style:{fontSize:'0.52rem',color:'var(--text-muted)',marginBottom:8}},snapshots.length+' snapshot'+(snapshots.length>1?'s':'')),
      PILLARS.map(function(pl){
        var history=snapshots.slice(0,6).map(function(s){return s.ratings[pl.id]||5}).reverse();
        var current=history[history.length-1];
        return h('div',{key:pl.id,style:{display:'flex',alignItems:'center',gap:6,padding:'3px 0'}},
          h('span',{style:{fontSize:'0.7rem',width:18}},pl.icon),
          h('span',{style:{fontSize:'0.54rem',color:'var(--text-sec)',width:90}},pl.label),
          h('div',{style:{flex:1}},h(Sparkline,{data:history,color:pl.color,width:60,height:16})),
          h('span',{style:{fontSize:'0.60rem',fontWeight:700,color:pl.color,width:16,textAlign:'right'}},current)
        );
      })
    ),

    /* Mood trend sparkline */
    checkIns.filter(function(c){return c.mood}).length>3&&h('div',{className:'card'},
      h('div',{className:'card-t'},'Mood Trend (last 14)'),
      h('div',{style:{display:'flex',justifyContent:'center'}},
        h(Sparkline,{data:checkIns.filter(function(c){return c.mood}).slice(-14).map(function(c){return c.mood}),color:'var(--teal)',width:280,height:40})
      )
    )
  );
}

/* ===== TASKS TAB ===== */
function TasksTab(p){
  var store=p.store;var setStore=p.setStore;
  var _view=useState('today');var view=_view[0];var setView=_view[1];
  var _newTask=useState('');var newTask=_newTask[0];var setNewTask=_newTask[1];
  var _energy=useState('medium');var energyFilter=_energy[0];var setEnergyFilter=_energy[1];

  var todayKey=today();
  var allTasks=store.tasks||[];
  var todoTasks=allTasks.filter(function(t){return t.status==='todo'});
  var todayTasks=allTasks.filter(function(t){return t.status==='today'||t.todayDate===todayKey});
  var waitingTasks=allTasks.filter(function(t){return t.status==='waiting'});
  var doneTasks=allTasks.filter(function(t){return t.status==='done'}).slice(0,15);

  function addTask(){
    if(!newTask.trim())return;
    var t={id:uid(),title:newTask.trim(),pillarIds:[],energyCost:'medium',status:view==='today'?'today':'todo',nextAction:'',meta:'Added '+todayKey,priority:2,doneDate:null,todayDate:view==='today'?todayKey:null};
    setStore(function(s){s.tasks.push(t);return s});
    setNewTask('');
  }

  function toggleDone(id){
    setStore(function(s){s.tasks=s.tasks.map(function(t){
      if(t.id!==id)return t;
      return Object.assign({},t,{status:t.status==='done'?'today':'done',doneDate:t.status==='done'?null:todayKey});
    });return s});
  }
  function removeTask(id){setStore(function(s){s.tasks=s.tasks.filter(function(t){return t.id!==id});return s})}
  function moveToToday(id){setStore(function(s){s.tasks=s.tasks.map(function(t){return t.id===id?Object.assign({},t,{status:'today',todayDate:todayKey}):t});return s})}
  function setEnergyCost(id,cost){setStore(function(s){s.tasks=s.tasks.map(function(t){return t.id===id?Object.assign({},t,{energyCost:cost}):t});return s})}

  /* Energy-filtered today tasks */
  var filteredToday=todayTasks;
  if(energyFilter==='survival')filteredToday=todayTasks.filter(function(t){return t.energyCost==='low'||t.status==='done'});
  else if(energyFilter==='low')filteredToday=todayTasks.filter(function(t){return t.energyCost!=='high'||t.status==='done'});

  var visTasks=view==='today'?filteredToday:view==='backlog'?todoTasks:view==='waiting'?waitingTasks:doneTasks;

  return h('div',{className:'fi'},
    h('div',{className:'card-hdr'},
      h('h1',{style:{fontFamily:'var(--fh)',fontSize:'1.15rem'}},'Tasks')
    ),

    /* Energy selector */
    view==='today'&&h('div',{className:'card',style:{padding:'8px 12px'}},
      h('div',{style:{fontSize:'0.50rem',color:'var(--text-muted)',marginBottom:4}},'Available energy'),
      h('div',{style:{display:'flex',gap:4}},ENERGY_LEVELS.map(function(el){
        return h('button',{key:el.id,className:'pill'+(energyFilter===el.id?' on':''),
          style:energyFilter===el.id?{background:el.color+'20',borderColor:el.color,color:el.color}:{},
          onClick:function(){setEnergyFilter(el.id)}},el.icon,' ',el.label);
      }))
    ),

    /* View tabs */
    h('div',{style:{display:'flex',gap:4,marginBottom:10}},
      [{id:'today',l:'Today ('+todayTasks.length+')'},{id:'backlog',l:'Later ('+todoTasks.length+')'},{id:'waiting',l:'Waiting ('+waitingTasks.length+')'},{id:'done',l:'Done'}].map(function(v){
        return h('button',{key:v.id,className:'pill'+(view===v.id?' on':''),onClick:function(){setView(v.id)}},v.l);
      })
    ),

    /* Survival mode message */
    energyFilter==='survival'&&view==='today'&&h('div',{className:'ins'},
      h('span',{className:'iico'},'\uD83D\uDECF\uFE0F'),
      h('span',{className:'itxt'},'Survival mode: only showing low-energy tasks. You\'re doing enough.')
    ),

    /* Task list */
    h('div',{className:'card'},
      visTasks.length===0?h('div',{style:{textAlign:'center',padding:'16px 0'}},
        h('div',{style:{fontSize:'0.68rem',color:'var(--text-muted)'}},
          view==='today'?'Pick tasks from your backlog, or add one below':
          view==='done'?'Nothing completed yet':'All clear!')
      ):
      visTasks.sort(function(a,b){return(a.status==='done'?1:0)-(b.status==='done'?1:0)||(a.priority||2)-(b.priority||2)}).map(function(t){
        return h('div',{key:t.id,className:'tsk'},
          h('div',{className:'tsk-chk'+(t.status==='done'?' done':''),onClick:function(){toggleDone(t.id)}},t.status==='done'?'\u2713':''),
          h('div',{style:{flex:1,minWidth:0}},
            h('div',{className:'tsk-title'+(t.status==='done'?' done':'')},t.title),
            h('div',{style:{display:'flex',gap:4,alignItems:'center',marginTop:2,flexWrap:'wrap'}},
              t.meta&&h('span',{className:'tsk-meta'},t.meta),
              t.energyCost&&h('span',{className:'ebadge '+t.energyCost},t.energyCost),
              view==='backlog'&&h('button',{className:'btn-s',style:{fontSize:'0.44rem',padding:'2px 6px'},onClick:function(e){e.stopPropagation();moveToToday(t.id)}},'+Today')
            )
          ),
          h('button',{style:{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:'0.52rem',opacity:0.4,padding:'2px 4px',flexShrink:0},
            onClick:function(){removeTask(t.id)}},'\u2715')
        );
      }),
      /* Quick add */
      view!=='done'&&h('div',{style:{display:'flex',gap:6,marginTop:8}},
        h('input',{type:'text',placeholder:'+ Quick add...',value:newTask,style:{fontSize:'0.64rem'},
          onChange:function(e){setNewTask(e.target.value)},
          onKeyDown:function(e){if(e.key==='Enter')addTask()}}),
        newTask.trim()&&h('button',{style:{background:'var(--teal)',color:'#0f1117',border:'none',borderRadius:'var(--rs)',padding:'6px 12px',fontSize:'0.64rem',fontWeight:700,cursor:'pointer',whiteSpace:'nowrap'},onClick:addTask},'Add')
      )
    )
  );
}

      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}},
        h('h1',{style:{fontFamily:'var(--fh)',fontSize:'1.2rem',color:'var(--red)'}},'\uD83D\uDEA8 Safety Plan'),
        h('button',{className:'btn-s',onClick:p.onClose},'Close \u2715')
      ),
      h('div',{style:{textAlign:'center',padding:'12px',background:'var(--red-dim)',borderRadius:'var(--r)',marginBottom:16}},
        h('div',{style:{fontSize:'0.72rem',fontWeight:700,color:'var(--red)'}},'You are not alone. This will pass.'),
        h('div',{style:{fontSize:'0.58rem',color:'var(--text-sec)',marginTop:4}},'Work through these steps at your own pace.')
      ),
      /* Step tabs */
      h('div',{style:{display:'flex',gap:3,marginBottom:12,overflowX:'auto'}},sections.map(function(s,i){
        return h('button',{key:i,className:'pill'+(step===i?' on':''),
          style:step===i?{background:'var(--red-dim)',borderColor:'var(--red)',color:'var(--red)'}:{},
          onClick:function(){setStep(i)}},s.title);
      })),
      h('div',{className:'fi'},sections[step].content())
    )
  );
}

/* ===== SETTINGS VIEW ===== */
function SettingsView(p){
  var store=p.store;var setStore=p.setStore;
  var dataSize=useMemo(function(){try{var s=window.localStorage.getItem(STORE_KEY);return s?Math.round(s.length/1024):0}catch(e){return 0}},[store]);

  function exportData(){
    var blob=new Blob([JSON.stringify(store,null,2)],{type:'application/json'});
    var url=URL.createObjectURL(blob);var a=document.createElement('a');
    a.href=url;a.download='life-os-backup-'+today()+'.json';
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  }
  function importData(){
    var input=document.createElement('input');input.type='file';input.accept='.json';
    input.onchange=function(e){var file=e.target.files[0];if(!file)return;
      var reader=new FileReader();reader.onload=function(ev){
        try{var d=JSON.parse(ev.target.result);
          if(d._v===4||d.checkIns||d.tasks){setStore(d);p.onClose();alert('Data restored!')}
          else{alert('Invalid backup file.')}
        }catch(err){alert('Could not read file: '+err.message)}
      };reader.readAsText(file)};
    input.click();
  }

  return h('div',{style:{position:'fixed',inset:0,background:'var(--bg)',zIndex:100,overflow:'auto'}},
    h('div',{className:'top-bar'},h('h1',null,'Settings'),h('button',{className:'btn-s',onClick:p.onClose},'\u2715 Close')),
    h('div',{className:'main'},
      h('div',{className:'card'},
        h('div',{className:'card-t'},'\uD83D\uDCBE Data Backup'),
        h('div',{style:{fontSize:'0.62rem',color:'var(--text-sec)',marginBottom:12,lineHeight:1.5}},
          'Your data lives in this browser\'s storage (',dataSize,'KB). Export regularly.'
        ),
        h('div',{style:{display:'flex',gap:8}},
          h('button',{className:'btn',style:{flex:1},onClick:exportData},'\u2B07\uFE0F Export'),
          h('button',{className:'btn',style:{flex:1,background:'var(--purple)'},onClick:importData},'\u2B06\uFE0F Import')
        )
      ),
      h('div',{className:'card'},
        h('div',{className:'card-t'},'\uD83D\uDCF1 Install as App'),
        h('div',{style:{fontSize:'0.62rem',color:'var(--text-sec)',lineHeight:1.5}},
          'For best experience, add to your home screen. Tap Share then "Add to Home Screen".')
      ),
      h('div',{className:'card'},
        h('div',{className:'card-t'},'\u2139\uFE0F About'),
        h('div',{style:{fontSize:'0.58rem',color:'var(--text-muted)',lineHeight:1.6}},
          'Life OS v4.0',h('br'),
          'All data stored locally. No accounts. No tracking.',h('br'),
          'Built for ADHD + BPD self-management.',h('br'),h('br'),
          'Dr. Cory Dugan')
      )
    )
  );
}

/* ===== RENDER ===== */
ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));

/* Service worker */
if('serviceWorker' in navigator){
  var sw='self.addEventListener("install",function(e){self.skipWaiting()});self.addEventListener("activate",function(e){e.waitUntil(clients.claim())});self.addEventListener("fetch",function(e){e.respondWith(fetch(e.request).catch(function(){return new Response("Offline")}))})';
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(function(){});
}
</script>
